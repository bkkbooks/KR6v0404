body:
  text: 古吳蕅益比丘智旭輯中山湯學紳康民閱梓禪宗要旨大方廣佛華嚴經初卷云爾時世尊於一切法成最正覺智入三世悉皆平等其身充滿一切世間其音普順十方國土乃至一一毛端悉能容受一切世界而無障礙身徧十方而無來往皆入諸相了法空寂三世諸佛所有神變於光明中靡不咸覩一切佛土不思議劫所有莊嚴悉令顯現述曰此乃所謂大徹大悟圓證心性之全體大用者也此之謂涅槃妙心此之謂正法眼藏禪者苟知以此為則决不至於得少為足起增上慢成大妄語矣本事經云出家有二種正所應作事謂靜慮聽說速證於涅槃靜慮慧為因慧必由靜慮有靜慮有慧速證於涅槃百千啞羊僧無慧修靜慮設經百千歲無一得涅槃勤修智慧人樂聽法說法斂念須臾頃能速證涅槃大寶積經出現光明會云愚人修習禪樂於禪定樂便起增上慢謂得沙門果愚人修習禪無眼盡邊智設於百千劫彼終無解脫菩薩藏會云若有樂定修相應行諸菩薩等未曾聽聞微妙法門又不聽聞聖教法律但於三摩地中生知足想當知是人起增上慢不能解脫生老病死文殊師利授記會云菩薩樂住寂靜入禪定者獲十功德利益一者得念二者得慧三者修行四者迅辯五者得陀羅尼六者善知法生七者善知法滅八者戒聚無犯九者諸天供養十者不貪他好文殊師利所說不思議佛境界經云禪以八法而得清淨一者常居蘭若宴寂思惟二者不共眾人羣聚談說三者於外境界無所貪著四者若身若心捨諸榮好五者飲食少欲六者無攀緣處七者不樂修飾音聲文字八者轉教他人令得聖樂善住意天子所問經云何等比丘得言禪師文殊師利荅言此禪師者於一切法一行思量所謂不生若如是知得言禪師乃至無有少法可取得言禪師不取何法所謂不取此世彼世不取三界至一切法悉皆不取謂一切法悉無眾生如是不取得言禪師若彼禪師無少法取非取不取以是義故得言禪師又云若有禪師生貪欲心生已能離能令寂靜能令寂滅如是得言空無所有不著不取大集經海慧菩薩品云菩薩若樂受寂靜樂不樂聽法說法問疑以寂靜故煩惱不起以不起故不知知想不離離想不證證想不修修想不得實義是名魔業月藏經云與禪相應者是我真子從佛口生從法化生地藏十輪經云修定行者若未成就諸三摩地初夜後夜當捨睡眠精進修學遠離憒閙少欲知足無所顧戀一切貪瞋忿覆惱害憍慢貢高慳悋嫉妒離間麄惡虛誑雜穢一切人間嬉戲放逸皆悉遠離大般若經云不應容納失念散亂相應之心經剎那頃何况令其長時相續小品般若經云譬如坐禪比丘從三昧起以學禪故不貪飲食大智度論云邪見人雖口說一切空然於愛處生愛瞋處生瞋慢處生慢癡處生癡自誑其身佛弟子實知空心不動一切結使生處不復生亦見教觀或有菩薩鈍根宿罪所覆深著世樂馳逸難制如是人深加精進爾乃得定行者能除身口破戒業次除三惡覺觀後除三細覺觀所謂國土親里不死如是除已即得禪定離欲者離五欲離惡不善法者離五蓋將人入惡道名為惡障善法故名不善此中言無佛破著佛想不言取無佛相若有佛尚不令取何况取無佛邪見又佛常寂滅無戲論相若人分別戲論常寂滅事亦墮邪見成實論云佛法可自證知不可以己所證傳與他人如財物等若無持戒則無禪定又戒為菩提樹根無根則無樹故須淨戒舍利弗阿毘曇論云若人聚集處心求名利便現生禪相是名來禪若人坐禪無儀是名無益禪出曜經云無禪不智無智不禪道從禪智得近泥洹南嶽思大師安樂行義云無相行者一切諸法中心相寂滅畢竟不生住坐臥飲食語言一切威儀心常定故諸餘禪定三界次第從欲界地未到地初禪地乃至非非想地有十一種差別不同有法無法二道為別是阿毘曇雜心聖行若安樂行中深妙禪定即不如此不依止欲界不住色無色行如是禪定是菩薩遍行畢竟無心想故名無想行圭峰密禪師云諸宗始祖即是釋迦經是佛語禪是佛意諸佛心口必不相違諸祖相承根本是佛親付菩薩造論始末唯弘佛經馬鳴龍樹皆是祖師造論釋經數千萬偈未有講者毀禪禪者毀講今時弟子彼此迷源修心者以經論為別宗講說者以禪門為別法聞談因果修證便推屬經論之家不知修證正是禪門之本事聞說即心即佛便推屬胸襟之禪不知心佛正是經論之本意未究佛言何同佛見提綱意在張網不可去網存綱舉領意在著衣不可棄衣取領大般涅槃經云佛告四眾吾今所有無上正法悉已付囑摩訶迦葉當為汝等作大依止猶如如來景德傳燈錄云佛告弟子摩訶迦葉吾以清淨法眼涅槃妙心實相無相微妙正法將付於汝汝當護持并敕阿難副貳傳化無令斷絕梅谿集王荊公謂佛慧泉禪師曰世尊拈花出自何經泉云藏經所不載公曰頃在翰苑偶見大梵天王問佛決疑經三卷有云梵王在靈山會上以金色波羅花獻佛請佛說法世尊登座拈花示眾人天百萬悉皆罔措獨迦葉破顏微笑世尊曰吾有正法眼藏涅槃妙心分付迦葉第一祖摩訶迦葉尊者景德錄云告諸比丘佛已茶毘金剛舍利非我等事我等宜當結集法眼無令斷絕乃說偈曰如來弟子且莫涅槃得神通者當赴結集第二祖阿難尊者佛祖統紀云遊行至竹林中聞比丘誦偈若人生百歲不見水潦涸不如生一日而得覩見之阿難慘然曰此非佛偈當云若人生百歲不解生滅法不如生一日而得解了之比丘向其師說師曰阿難老朽言不可信阿難後時聞比丘猶誦前偈即自思惟今此比丘不受吾教於世無益宜入涅槃第十九祖鳩摩羅多尊者告闍夜多曰業從惑生惑因識有識依不覺不覺依心心本清淨無生滅無造作無報應無勝負寂寂然靈靈然汝若入此法門可與諸佛同矣一切善惡有為無為皆如夢幻夜多承言領旨即發宿慧出家受具出景德錄第二十一祖婆修盤頭尊者此云徧行自說宿命云憶念七劫前師於智者月淨記我非久當證斯陀含果時有大光明菩薩出世我䇿杖禮謁師叱我曰重子輕父一何鄙哉我問其過師曰汝禮大光明菩薩以杖倚壁畵佛面以此過慢遂失二果出景德錄第二十八祖菩提達摩尊者此土初祖也景德錄第三卷云有道育慧可二沙門年雖後生俊志高遠幸逢法師事之數載法師感其精誠誨以真道令如是安心所謂壁觀即所謂外息諸緣內心無喘心如墻壁可以入道如是發行所謂四行如是順物防護譏嫌如是方便遣其不著夫入道多途要唯二種一是理入二是行入理入者謂藉教悟宗深信含生同一真性但為客塵妄想所覆不能顯了若捨偽歸真凝住壁觀無自無他凡聖等一堅住不移不隨他教此即與現冥符無有分別寂然無為名理入也行入四行萬行同攝初報怨行者謂修道人若受苦時當念往劫捨本逐末多起愛憎今雖無犯是我宿殃惡業果熟非天非人所能見與甘心忍受都無怨訴經云逢苦不憂何以故識達故此心生時與理相應體怨進道故言報怨行也二隨緣行者眾生無我苦樂皆從緣生縱得榮譽等事宿因所搆今方得之緣盡還無何喜之有得失從緣心無增減喜風不動冥順於道也三無所求行者世人長迷處處貪著名之為求智者悟真理與俗反安心無為形隨運轉萬有斯空無所願樂有身皆苦誰得而安經云有求皆苦無求乃樂故言無所求行也四稱法行者性淨之理目之為法此理眾相斯空無染無著無彼無此經云法無眾生離眾生垢故法無有我離我垢故智者若能信解此理應當稱法而行法體無慳於身命財行檀捨施心無悋惜達解三空不倚不著但為去垢稱化眾生而不取相此為自行復能利他亦能莊嚴菩提之道檀施既爾餘五亦然為除妄想修行六度而無所行是為稱法行也又謂二祖曰二百年後衣鉢止而不傳法亦大盛當是知道者多行道者少說理者多悟理者少又云此有楞伽經四卷蓋如來極談法要亦可以與世開示悟入祖為期城太守楊衒之說偈曰亦不覩惡而生嫌亦不觀善而勤措亦不捨智而近愚亦不拋迷而就悟達大道兮過量通佛心兮出度不與凡聖同纏超然名之曰祖傅大士心王銘云觀心空王玄妙難測無形無相有大神力能滅千災成就萬德體性雖空能施法則觀之無形呼之有聲為大法將心戒傳經水中鹽味色裏膠青決定是有不見其形心王亦爾身內居停面門出入應物隨情自在無礙所作皆成了本識心識心見佛是心是佛是佛是心念念佛心佛心念佛欲得早成戒心自律淨律淨心心即是佛除此心王更無別佛欲求成佛莫染一物心性雖空貪瞋體實入此法門端坐成佛到彼岸已得波羅蜜慕道真士自觀自心知佛在內不向外尋即心即佛即佛即心心明識佛曉了識心離心非佛離佛非心非佛莫測無所堪任執空滯寂於此漂沈諸佛菩薩非此安心明心大士悟此玄音身心性妙用無更改是故智者放心自在莫言心王空無體性能使色身作邪作正非有非無隱顯不定心性離空能凡能聖是故相勸好自防慎剎那造作還復漂沈清淨心智如世黃金般若法藏竝在身心無為法寶非淺非深諸佛菩薩了此本心有緣遇者非去來今第二十九祖慧可大師此土二祖也景德錄云北齊天平二年有一居士年踰四十不言名氏聿來設禮問曰弟子身纏夙恙請和尚懺罪師曰將罪來與汝懺居士良久云覓罪不可得師曰我與汝懺罪竟宜依佛法僧住居士曰今見和尚已知是僧未審何名佛法師曰是心是佛是心是法法佛無二僧寶亦然居士曰今日始知罪性不在內不在外不在中間如其心然佛法無二也師即為剃髮名為僧璨其年三月十八日於光福寺受具自茲疾漸愈執侍經二載付以法并信衣僧那禪師姓馬氏少通墳典年二十一講禮易於東海聽者如市後投二祖出家永捐世典唯一衣一鉢一坐一食奉頭陀行謂門人慧滿曰祖師心印非專苦行但助道耳若契本心發隨意真光之用則苦行如握土成金若唯修苦行而不明本心為憎愛所縛則苦行如黑月夜履於險道汝欲明本心者當審諦推察遇色遇聲未起覺觀時心何所之是無耶是有耶既不墮有無處所則心珠獨朗常照世間無一塵許間隔未嘗有一剎那頃斷續之相故我初祖兼付楞伽經四卷謂我師二祖曰吾觀震旦唯有此經可以印心仁者依行自得度世又二祖凡說法竟乃曰此經四世之後變成名相深可悲哉出景德錄向居士幽棲林野木食澗飲北齊天保初聞二祖盛化乃致書曰影由形起響逐聲來弄影勞形不識形為影本揚聲止響不知聲是響根除煩惱而趣涅槃喻去形而覓影離眾生而求佛果喻默聲而尋響故知迷悟一途愚智非別無名作名因其名則是非生矣無理作理因其理則諍論起矣幻化非真誰是誰非虛妄無實何空何有將知得無所得失無所失未及造謁聊此申意伏望荅之二祖荅曰備觀來意皆如實真幽之理竟不殊本迷摩尼謂瓦礫豁然自覺是真珠無明智慧等無異當知萬法即皆如愍此二見之徒輩申辭措筆作斯書觀身與佛不差別何須更覔彼無餘景德錄慧滿禪師嘗示人曰諸佛說心令知心相是虛妄今乃重加心相深違佛意又增論議殊乖大理故常齎楞伽經四卷以為心要如說而行景德錄第三十祖僧璨大師此土三祖信心銘云至道無難惟嫌揀擇但莫憎愛洞然明白毫釐有差天地懸隔欲得現前莫存順逆違順相爭是為心病不識玄旨徒勞念靜圓同太虛無欠無餘良由取捨所以不如莫逐有緣勿住空忍一種平懷冺然自盡止動歸止止更彌動惟滯兩邊寧知一種一種不通兩處失功遣有沒有存空背空多言多慮轉不相應絕言絕慮無處不通歸根得旨隨照失宗須臾處照勝却前空前空轉變皆由妄見不用求真唯須息見二見不住慎莫追尋纔有是非紛然失心二由一有一亦莫守一心不生萬法無咎無咎無法不生不心能隨境滅境逐能沈境由能境能由境能欲知兩段元是一空一空同兩齊含萬象不見精麄寧有偏黨大道體寬無易無難小見狐疑轉急轉遲執之失度必入邪路放之自然體無去住任性合道逍遙絕惱繫念乖真昏沈不好不好勞神何用疎親欲取一乘勿惡六塵六塵不惡還同正覺智者無為愚人自縛法無異法妄自愛著將心用心豈非大錯迷生寂亂悟無好惡一切二邊良由斟酌夢幻空花何勞把捉得失是非一時放却若眼不睡諸夢自除心若不異萬法一如一如體玄兀爾忘緣萬法齊歸觀復自然泯其所以不可方比止動無動動止無止兩既不成一何有爾究竟窮極不存軌則契心平等所作俱息狐疑盡淨正信調直一切不留無可記憶虛明自照不勞心力非思量處識情難測真如法界無他無自要急相應唯言不二不二皆同無不包容十方智者皆入此宗宗非促延一念萬年無在不在十方目前極小同大忘絕境界極大同小不見邊表有即是無無即是有若不如此必不須守一即一切一切即一但能如是何慮不畢信心不二不二信心言語道斷非去來今第三十一祖道信大師此土四祖姓司馬年始四十來禮三祖曰願和尚慈悲乞與解脫法門祖曰誰縛汝曰無人縛祖曰何更求解脫乎信於言下大悟服勞九載後於吉州受戒侍奉尤謹乃付衣法既嗣祖風攝心無寐脅不至席者六十年隋大業十三載領徒眾抵吉州值羣盜圍城七旬不解萬眾惶怖師教令念摩訶般若時賊眾望雉堞間若有神兵乃引去示牛頭法融曰境緣無好醜好醜起於心心若不強名妄情從何起妄情既不起真心任徧知法達禪師問六祖曰但得解義不勞誦經耶祖曰經有何過豈障汝念只為迷悟在人損益由汝乃至既領玄旨亦不輟持誦祖曰汝今後方可名為念經僧也六祖謂志徹曰吾傳佛心印安敢違於佛經示智通四智偈曰大圓鏡智性清淨平等性智心無病妙觀察智見非功成所作智同圓鏡五八六七果因轉但轉名言無實性若於轉處不留情繁興永處那伽定示知常偈曰不見一法存無見大似浮雲遮日面不知一法守空知還如太虛生閃電此之知見瞥然興錯認何曾解方便汝當一念自知非自己靈光常顯現神秀禪師偈曰一切佛法自心本有將心外求捨父逃走洞山問無情說法據何教典國師云灼然言不干典非君子之所談汝豈不見華嚴經云剎說眾生說三世一時說後問溈山溈令問雲巖道人巖云不見彌陀經云水鳥樹林皆悉念佛念法洞山因悟南陽忠國師云禪宗學者應遵佛語一乘了義契自心源不了義者互不相許如獅子身蟲夫為人師若涉名利別開異端則自他何益問即心是佛可更修萬行否師曰諸聖皆具二嚴豈撥無因果耶吾比遊方多見聚却三五百眾目視雲漢云是南方宗旨把他壇經改換添糅鄙譚削除聖意惑亂後徒豈成言教苦哉吾宗喪矣牛頭第六世慧忠禪師安心偈曰人法雙淨善惡兩忘直心真實菩提道塲宣州玄挺禪師或問南宗自何而立師曰心宗非南北鳥窠道林禪師白居易禮謁問曰禪師住處甚危險師曰太守危險尤甚曰弟子位鎮江山何險之有師曰薪火相交識性不停得非險乎又問如何是佛法大意師曰諸惡莫作眾善奉行白曰三歲孩兒也解恁麼道師曰三歲孩兒雖道得八十老人行不得大寂道一禪師示眾曰道不用修但莫污染何為污染但有生死心造作趣向皆是污染若欲直會其道平常心是道謂平常心無造作無是非無取捨無斷常無凡無聖經云非凡夫行非賢聖行是菩薩行只如今行住坐臥應機接物盡是道道即是法界乃至河沙妙用不出法界若不然者云何言心地法門云何言無盡燈一切法皆是心法一切名皆是心名萬法皆從心生心為萬法之根本經云識心達本源故號為沙門名等義等一切諸法皆等純一無雜若於教門中得隨時自在建立法界盡是法界若立真如盡是真如若立理一切法盡是理若立事一切法盡是事舉一千從理事無別盡是妙用要無別理乃至建立亦得掃蕩亦得又云性無有異用則不同順理為悟順事為迷迷即迷自家本心悟即悟自家本性一悟永悟不復更迷如日出時不合於冥了心及境界妄想即不生妄想既不生即是無生法忍本有今有不假修道坐禪如今若見此理真正不造諸業隨分過生一衣一鉢坐起相隨戒行增熏積於淨業但能如是何慮不通百丈懷海禪師曰汝莫言有少分戒善將為便了有恆沙無漏戒定慧門都未涉一毫在努力猛作早修莫待耳聾眼暗頭白面皺老苦及身眼中流淚心中慞惶未有去處到恁麼時整理脚手不得也讀經看教語言皆須宛轉歸就自己但是一切言教祇明如今覺性南泉願禪師云近日禪師太多覓個癡鈍人不可得不道全無於中還少趙州問如何是道師曰平常心是道州曰還可趨向也無師曰擬向即乖州曰不擬爭知是道師曰道不屬知不屬不知知是妄覺不知是無記若真達不疑之道猶如太虛廓然蕩豁豈可強是非耶白居易問惟寬禪師曰既曰禪師何以說法師曰無上菩提者被於身為律說於口為法行於心為禪應用有三其致一也譬如江湖淮漢在處立名名雖不一水性無二律即是法法不離禪云何於中妄起分別曰既無分別何以修心師曰心本無損傷云何要修理無論淨與垢一切勿念起曰垢即不可念淨無念可乎師曰如人眼睛上一物不可住金屑雖珍寶在眼亦為病曰無修無念又何異凡夫耶師曰凡夫無明二乘執著離此二病是曰真修真修者不得勤不得忘勤即近執著忘即落無明此為心要云爾溈山祐禪師示眾云夫道人之心質直無偽無背無面無詐妄心行一切時中視聽尋常更無委曲亦不閉眼塞耳但情不附物即得從上諸聖秖是說濁邊過患若無如許多惡覺情見想習之事譬如秋水澄渟清淨無為澹泞無礙喚他作道人亦名無事之人時有僧問頓悟之人更有修否師云若真悟得本他自知時修與不修是兩頭語如今初心雖從緣得一念頓悟自理猶有無始曠劫習氣未能頓淨須教渠淨除現業流識即是修也不道別有法教渠修行趨向唐宣宗問弘辨禪師曰有人持經念佛持咒求佛如何對曰如來種種開讚皆為最上一乘如百川眾流莫不朝宗於海如是差別諸數皆歸薩婆若海帝曰禪師既會祖意還禮佛轉經否對曰沙門釋子禮佛轉經蓋是住持常法有四報焉然依佛戒修身叅尋知識漸修梵行履踐如來所行之迹帝曰何為頓見何為漸修對曰頓明自性與佛同儔然有無始染習故假漸修對治令順性起用如人吃飯不一口便飽仰山寂禪師問溈山祐禪師云如何是真佛住處溈曰以思無思之妙返思靈燄之無窮思盡還源性相常住事理不二真佛如如師於言下頓悟自此執侍尋往江陵受戒住夏探律藏仰山示眾曰汝等諸人各自廻光返顧莫記吾言汝無始劫來背明投暗妄想根深卒難頓拔所以假設方便奪汝粗識如將黃葉止啼有甚麼是處又云且莫將心湊泊但向自己性海如實而修不要三明六通何以故此是聖末邊事如今且要識心達本但得其本莫愁其末他時後日自具去在若未得本縱饒將情學他亦不得壽山解禪師上堂曰諸上座幸有真實言語相勸諸兄弟各各自體悉凡聖情盡體露真常但一時卸却從前虛妄攀緣塵垢心如虛空相似他時後日合識得些子好惡玄沙備禪師云夫學般若菩薩是大根器有大智慧始得若有智慧即今便得出脫若是根機遲鈍直須勤苦忍耐日夜忘疲失食如喪考妣相似恁麼急切盡一生去更得人荷挾尅骨究實不妨亦得覯去莫只是記言記語恰似念陀羅尼相似蹋步向前來口裏哆哆啝啝地被人把住詰問著沒去處便瞋道和尚不為我答話恁麼學事大苦知麼奈何汝無始積劫動諸妄情結成煩惱如重病人心狂熱悶顛倒亂見都無實事如今所覩一切境界皆亦如是對汝諸根盡成顛倒古人以無窮妙藥醫療對治直至十地未得惺惺將知大不容易古人思惟如喪考妣如今兄弟見似等閒何處別有人為汝了得可惜時光虛度何妨密密地自究子細觀尋至無著力處自息諸緣去縱未發明種子猶在若總取我傍家打鼓弄粥飯氣力將此造次排遣生死賺汝一生有何所益今時人不悟個中道理妄自涉事涉塵處處染著頭頭繫絆縱悟得塵境紛紜名相不實便擬凝心斂念攝事歸空閉目藏睛才有念起旋旋破除細想才生即便遏捺如此見解即是落空亡的外道魂不散的死人冥冥漠漠無覺無知塞耳偷鈴徒自欺誑師閱楞嚴發明心地由是應機敏捷與修多羅冥契諸方玄學有所未決必從之請益至與雪峰徵詰亦當仁不讓峰曰備頭陀再來人也雲門偃禪師云一般掠虛漢食人涎唾記得一堆一擔搕𢶍到處馳騁驢脣馬嘴我解問十轉五轉話饒你從朝問到夜論劫恁麼還曾夢見也未又云信心檀越把菜粒米作麼生消得直須自看時不待人忽然一日眼光落地前頭將甚麼抵擬莫一似落湯螃蠏手脚忙亂無你掠虛說大話處莫將等閑空過時光一失人身萬劫不復不是小事師靜上座玄沙法嗣也有人問曰弟子每當夜坐心念紛飛未明攝伏之方願垂示誨師曰如或夜間安坐心念紛飛卻將紛飛之心以究紛飛之處究之無處則紛飛之念何存返究究心則能究之心安在又能照之智本空所緣之境亦寂寂而非寂者蓋無能寂之人也照而非照者蓋無所照之境也境智俱寂心慮安然外不尋枝內不住定二途俱泯一性怡然此乃還源之要道也達觀筠禪師示眾曰從上諸聖方便門不少大抵只要諸仁者有箇見處然雖未見且不參差一絲髮許諸仁者亦未嘗違背一絲髮許且莫嫌他佛語莫重祖師直下是自己眼明始得志逢禪師云教意祖意同一方便終無別理彼若明得此亦昭然又云古德為法行脚實不憚勤勞如雪峰和尚三廻到投子九度上洞山盤桓往返尚求箇入路不得看汝近世叅學人纔跨門來便待老僧接引指掌說禪且汝欲造玄極之道豈當等閒大珠禪師上堂曰諸人幸自好個無事人苦死造作要擔枷落獄作麼每日至夜奔波道我叅禪學道解會佛法如此轉無交涉也只是逐聲色走有何歇時問如何是佛如何是法如何是僧如何是一體三寶師垂示曰心是佛不用將佛求佛心是法不用將法求法佛法無二和合為僧即是一體三寶經云心佛與眾生是三無差別身口意清淨名為佛出世三業不清淨名為佛滅度唯是一心實無二體問未知律師法師禪師何者最勝師答曰夫律師者啟毘尼之法藏傳壽命之遺風洞持犯而達開遮秉威儀而行軌範牒三番羯磨作四果初因若非宿德白眉焉敢造次夫法師者踞師子之座瀉懸河之辨對稠人廣眾啟鑿玄關開般若妙門等三輪空施若非龍象蹴蹋安敢當斯夫禪師者撮其樞要直了心源出沒卷舒縱橫應物咸均事理頓見如來拔生死深根獲現前三昧若不安禪靜慮到者裏總須茫然隨機授法三學雖殊得意忘言一乘何異故經云十方佛土中唯有一乘法無二亦無三除佛方便說但以假名字引導於眾生律師法明謂師曰禪師家多落空師曰却是座主家落空明大驚曰何得落空師曰經論是紙墨文字文字者俱是空設於聲上建立名句等法無非是空座主執滯教體豈不落空明曰禪師何得不落空師曰文字等皆從智慧而生大用現前那得落空問如何是修行答曰但莫染汙自性即是修行莫自欺誑即是修行心幻也一切俱幻心空也一切皆空迷時人逐法悟時法由人如森羅萬象至空而極百川眾流至海而極一切賢聖至佛而極十二分經五部毘尼五韋陀論至心而極心者是總持之妙本萬法之洪源亦名大智慧藏無住涅槃百千萬名盡心之異號耳心逐物為邪物從心為正若了了見性者如摩尼珠現色說變亦得說不變亦得若不見性人聞說真如變易便作變易解會說不變易便作不變易解會汾州無業國師云如今天下解禪解道如何沙數說佛說心有千萬億纖塵不去未免輪廻思念不忘盡須沈墜如斯之類尚不能自識業果妄言自利利他自謂上流竝他先德但言觸目無非佛事舉足皆是道場原其所習不如一個五戒十善凡夫觀其發言嫌他二乘十地菩薩且醍醐上味為世所珍遇斯等人翻成毒藥嗟乎得人身者如爪甲上土失人身者如大地土良可傷哉設有悟理之者有一知一解不是悟中之則入理之門便謂永出世利巡山傍澗輕忽上流致使心漏不盡理地不明空到老死無成虛延歲月且聰明不能敵業乾慧未免苦輪臨終之時一毫凡聖情量不盡纖塵思念未忘隨念受生輕重五陰向驢胎馬腹裏託質泥犁鑊湯裏煑煠一遍了從前記持憶想見解智慧都盧一時失却依前再為螻蟻從頭更作蚊䖟雖是善因而遭惡果祖師來至此土非常有損有益有益者百千人中撈漉一個半個堪為法器有損者如前已明從他依三乘教法修行不妨却得四果三賢有進修之分魏府華嚴長老示眾云不依佛法一切法皆是邪法外道見解道原傳燈錄云達磨大師以心傳心不滯名數直為上上根智俾忘筌忘意故與台教同而不同智者大師窮理盡性備足之門故與禪宗異而非異也壇經云若見一切法心不染著是為無念用即遍一切處亦不著一切處但淨本心使六識出六門於六塵中無染無雜來去自由通用無滯即是般若三昧自在解脫名無念行若百不思常令念絕即是法縛即名邊見若真修道人不見世間過若見他人非自非却是左他非我不非我非自有過但自却非心打除煩惱破憎愛不關心長伸兩脚臥欲擬化他人自須有方便勿令彼有疑即是自性現內心謙下是功外行於禮是德自性建立萬法是功心體離念是德不離自性是功應用無染是德若修功德之人心即不輕常行普敬心常輕人吾我不斷即自無功自性虛妄不實即自無德馬祖問石鞏作甚麼鞏曰牧牛祖問作麼生牧鞏曰一回入草去驀鼻拽將回祖曰子真牧牛百丈祖師云若怕臨終之時慞狂不得自由即須如今便自由始得秖如今於一一境法都無愛染亦莫依住知解便是自由人如今是因臨終是果果業已現如何怕得祇如今但有一切求心盡名破戒比丘名字羅漢盡名野犴灼然銷他供養不得秪如今聞聲如響等嗅香如風等離一切有無等法亦不住於離亦無不住知解此人一切罪垢不能相累為求無上菩提涅槃故名出家猶是邪願況乎世間諍論覓勝負說我能我解貪一門徒愛一弟子戀一住處結一檀越一衣一食一名一利又言我得一切無礙秪是自誑若執本清淨本解脫自是佛自是禪道解者即屬自然外道若執因緣修成證得者即屬因緣外道執有即屬常見外道執無即屬斷見外道執亦有亦無即屬邊見外道執非有非無即屬空見外道亦云愚癡外道沙門持齋持戒忍辱柔和慈悲喜捨尋常是僧家法則會與麼會宛然依佛教只是不許貪著依執若守住自己知覺又成自然外道若更別求又屬因緣外道此土初祖云心有所是必有所非若貴一物則被一物惑若重一物則被一物惑信被信惑不信又成謗莫貴莫不貴莫信莫不信佛亦不是無為雖不是無為又不是冥寞猶如虛空佛是大心眾生鑑覺多鑑覺雖多他鑑覺清淨貪瞋鬼捉他不著佛是纏外入無纖毫愛取亦無無愛取知解是名具足六度萬行若要莊嚴具種種皆有如不要他不用亦不失他使得因果福智自由是修行非是執勞負重喚作修行固守動靜三世佛怨此外別求即同魔說師問西堂智藏曰子何不看經堂曰經豈異耶師曰然雖如此汝向後為人也須得鵝湖大義禪師問諸碩德行住坐臥畢竟以何為道有對知者是道師曰不可以智知不可以識識安得知者是乎有對無分別者是道師曰善能分別諸法相於第一義而不動安得無分別是乎有對四禪八定是道師曰佛身無為不墮諸數安在四禪八定耶眾皆杜口黃蘗禪師或問從上皆云即心即佛未審即那個心是佛師曰你有幾個心問為復即凡心是佛即聖心是佛師曰何處有凡聖心耶問即今三乘中說有凡聖和尚何得言無師曰三乘中分明向你道凡聖心是妄你今不解返執為有將空作實豈不是妄妄故迷心汝但除却凡情聖境心外更無別佛祖師西來直指一切人全體是佛汝今不識執凡執聖向外馳騁還自迷心當人事宜不能體會得但知學言語念向皮袋裏安著到處稱我會禪還替得汝生死麼輕忽老宿入地獄如箭一切諸法皆由心造如今但學無心頓息諸緣莫生妄想分別無人無我無貪瞋無憎愛無勝負但除却如許多種妄想性自本來清淨即是修行菩提法佛等若不會此意縱你廣學勤苦修行木食草衣不識自心皆名邪行盡作天魔外道水陸諸神或作一機一境揚眉動目抵對相當便道契會也得證悟禪理也忽逢一人不解便道都無所知對他若得道理心中便歡喜若被他折伏不如他便即心懷惆悵如此心意學禪有何交涉任汝會得少許道理秪得箇心所法禪道總沒交涉師在鹽官會裏唐宣宗時為沙彌師於殿上禮佛沙彌云不著佛求不著法求不著僧求長老禮拜當何所求師曰不著佛求不著法求不著僧求常禮如是事沙彌云用禮何為師便掌沙彌云太粗生師曰者裏是什麼所在說粗說細隨後又掌沙彌便走分明向你道爾燄識你作麼生擬斷他喻如陽燄你道近十方世界求不可得你道遠看時秪在目前你擬趂他他又轉遠去你始避他他又來逐你取又取不得捨又捨不得既若如此故知一切法性自爾即不用愁他慮他如言前念是凡後念是聖如手翻覆一般此是三乘教之極也據我禪宗中前念且不是凡後念且不是聖前念不是佛後念不是眾生所以一切色是佛色一切聲是佛聲舉著一理一切理皆然見一事見一切事見一心見一切心見一道見一切道一切處無不是道乃至十方世界不出我之一心一切微塵國土不出我之一念說什麼內之與外若作自然見即落自然外道若作無我無我所見墮在三賢十聖位中你云何將一尺一寸便擬量度虛空夫叅禪學道須得一切處不生心秪論忘機即佛道隆分別即魔軍盛畢竟無毛頭許少法可得臨濟禪師曰莫取次被諸方老師印破面門道我解禪解道辨似懸河皆是造地獄業若是真正學道人不求世間過切急要求真正見解你欲識文殊麼秪你目前用處始終不異處處不疑此箇是活文殊你一念心無差別光處處總是真普賢你一念心自能解縛隨處解脫此是觀音三昧法互為主伴出則一時出一即三三即一如是解得始好看教你取山僧口裏語不如休歇無事去已起者莫續未起者不要放起便勝你十年行脚問如何是西來意師曰若有意自救不了問既無意云何二祖得法師曰得者是不得問既若不得云何是不得底意師曰為你向一切處馳求心不能歇所以祖師云咄哉丈夫將頭覔頭你言下便自廻光返照更不別求知身心與祖佛不別當下無事方名得法你諸處指胸點頭道我解禪解道三個兩個到者裏不奈何咄哉你將者個身心到處簸兩片皮誑諕閭閻喫鐵棒有日在非出家兒盡向阿修羅界攝師應機多用喝會下叅徒亦學師喝師曰汝等總學我喝我今問汝有一人從東堂出一人從西堂出兩人齊喝一聲者裏分得賓主麼汝且作麼生分若分不得已後不得學老僧喝饒你分得亦不得學老僧喝南泉師云若論看教自有經論座主他教家實大可畏你且不如聽法好問伏承華嚴經是法身佛說如何師顧視歎曰若是法身說你向什麼處聽微妙淨法身具相三十二只是不計分劑心量若無如是心一切行處乃至彈指合掌皆是正因萬善皆同無終始得自在長沙岑禪師皓月問天下善知識證三德涅槃也未師曰大德問果上涅槃因中涅槃曰問果上涅槃師曰天下善知識未證曰為甚麼未證師曰功未齊於諸聖曰功未齊於諸聖何為善知識師曰明見佛性亦得名為善知識子湖山神力利蹤禪師云心源朗朗無物莫疑直下承當不勞功用只少個信之一字然實不易信莫非夙習之徒聞著便能承受若是螢學之輩將三寸脣舌惑亂於人後進初機把他古聖之談向意根下測度直至頭白齒黃並無纖毫得力處乃至得少為足鼓弄片皮於佛法却為毒害譏禮塔廟毀彼持經獅子身中蟲自食獅子身中肉說得千般美食不如一頓粗餐趙州禪師或問諸佛還有師也無師曰有問如何是諸佛師師曰阿彌陀佛阿彌陀佛問和尚受大王如是供養將什麼報荅師曰念佛示眾云佛之一字吾不喜聞問和尚還為人也師云佛佛但究理而坐二三十年若不會截取老僧頭去老僧九十年前見馬祖大師下八十餘員善知識個個俱是作家不似如今知識枝蔓上生枝蔓大都是去聖遙遠一代不如一代兄弟莫久立有事商量無事向衣鉢下坐窮理好老僧行脚時除二時齋飯是雜用心力處餘外更無別用心力處也若不如此出家大遠在問萬物中何物最堅師云相罵饒你接嘴相吐饒你撥水上堂云兄弟但改往修來若不改大有著你處在老僧在此間三十餘年未曾有一個禪師到此間設有來一宿一食急走過且趂軟煖處去也雲門禪師示眾云諸方老和尚道須知有聲色外一段事似者個說話誑諕人家男女三間法堂裏獨自妄想未曾夢見我本師宗旨在作麼生消得他信施臘月三十日個個須償他始得遺誡云佛有明教依而行之東山浣禪師云學道先須得旨歸聞聲見色不思議若憑言語論高下一似從前未悟時空門有路人皆到到者方知旨趣長心地不生閒草木自然身放白毫光葉縣省禪師有問看經即是不看即是師云青山無異路東西任意遊進云太不定生師云自是盲者過非日月咎神鼎諲禪師云參須實參悟須實悟閻羅大王不怕多語夫參學須具參學眼始得若只愛他人語句記在意識下自不能截斷俗士尚云男兒不用分外財衲僧家合作麼生著精彩始得長慶稜禪師云寧說阿羅漢有三毒不說如來有二種語不道如來無語只是無二種語法華舉禪師云夫行脚者不在觀州玩府看山門景致蓋為生死事大從上古人凡到所在見一個村院主也須問過如今晚學往往蹉過不肯遞相博問洛浦安禪師或問祖意教意是同是別荅曰日月並輪輝誰家別有路曰恁麼則顯晦殊途事非一概師曰但自不亡羊何須泣岐路佛眼遠禪師云諸人每日行千行萬不是行不到何故却不分曉只為信之不及若信得及則不行而到也十方世界事不待思量一時曉了得諸人每日說千說萬不是說不到何故却不分曉亦是信之不及若信得及則實無所說也三世如來所說之法不待思量一時曉了得大眾還到恁麼田地也未若是為生死底人須求親證若是人我參學之人恥為不會須求覓解會到處覓相似語句遞相印證滅胡種族教壞人家男女我此門中都無是事還知麼聾人也唱胡笳曲好惡高低自不聞先聖道得旨忘言遺事觀理後人不達便乃事外尋理言外求旨譬如以手撮摩虛空徒自疲勞終無所益要知得力用意處麼須即事無事即言無言悟入方親解會不得五色燈光眚所成但除其眚莫除塵若言本眼何曾眚乃是臨河渴死人今時學者不究佛語秖究祖師語殊不知祖師語即是佛語莫如此揀擇却成謗法去秖如雲門大師示眾曰人人盡有光明在看時不見暗昏昏作麼生是光明自代云三門佛殿厨庫僧堂又云好事不如無者個是祖師語是他道三門佛殿厨庫僧堂諸人尋常看時是看是不看若看他道看時不見暗昏昏如何得成光明既是光明了又云好事不如無作麼生又不要去且如楞嚴會上說個晦昧為空空晦暗中結暗為色色雜妄想想相為身聚緣內搖趣外奔逸昏擾擾相以為心性一迷為心決定惑為色身之內不知色身外洎山河虛空大地咸是妙明真精妙心中所現物者個說話甚是子細且道與雲門道底事相去多少莫秖明祖師語不看佛語有人曰我亦不用佛語亦不用祖師語秖用自語祖師語佛語尚不要更用自語又道我宗無語不用言語有語尚不是况無語耶莫作夢從朝至夜佛法作一邊祖師語作一邊有語作一邊無語作一邊妄想作一邊無妄想作一邊若恁麼真可謂看時不見暗昏昏也近來參學之人盡皆奔馳語句舉古論今於本分事全不明了所以正宗淡泊道法淋漓十可行宴坐入室普請粥飯掃地洗衣經行誦經禮拜道話真實到家之士何暇論家決定證得之人寧標所證論家論證乃閭閻負販之徒無證無家誠飄露伶俜之子何不興決烈之志啟特達之懷舉措看他上流勿漫隨於庸鄙一一從自己胸中流出與我蓋天蓋地去始得奉勸諸人快好究取二六時中去離塵垢莫起異念豈不聞昔有一人在高樓上見二比丘從樓前過有二鬼使掃併道路復有二鬼散華隨後及二比丘廻次二鬼復在前叱喝噀唾二鬼隨後掃除脚迹其人遂下樓問二比丘所以二比丘方悔感悟乃云我等去時共談佛理及至廻時却言雜語諸禪德此雖粗境界子細推求乃是學道之人大事秖為情念瞥起外境現前念若不生無境可得謗般若罪大不可當乍可不會却永劫無事切莫未得謂得起大我慢輕忽先達若也實得個安樂處便須識得些子好惡辨取些子邪正不可瞞瞞盰盰儱儱侗侗祇成自欺自誑山僧直是不昧諸聖如今在者裏不惜口業與諸人如此論量喚作論實不論虛我秪要一個見解明白徹底悟得底人不要你許多作用奇特機鋒玄絕棒喝齊施如此者總不消得拈出也今時人須是自尊自貴自成自立始得若能如此方有個休歇處雖有個休歇亦無休歇之量若不如此捏目生華見事便差而今道眼不明出世者多罪過罪過祗趂目前不憂後世打鬼骨臀苦苦你諸人有福德因緣未悟心切不可作出世人禍事禍事若有真實事自然馨香你看多少虛頭禪師久久一日不如一日如刻人糞作旃檀形到了秪是屎臭氣古人道不知者無所不知無所不到喚作不知要你到那不知底田地此是諸聖境界豈比如今拍盲不會喚作不知分明不會秖管尋討學些子知解記些子言語此喚作運糞入如今四生六道浩浩地秪為此事不明奉勸諸兄弟且先去却粗緣你十二時中思衣念食種種雜慮如燈熖相似未有一時停歇但除粗緣所有微細自然淨盡日久歲深自然會去祖師未來此時還有佛法麼作麼道無得若道無秖成自瞞在少林面壁時還有許多言教公案麼恁麼覷得破多少省徑今時人不了當者只是不解決擇將古人言句作解會將自己來錐鑽如此到彌勒下生也不會如今但莫取我口各自由你做工夫看古人因緣亦得靜坐亦得一切處觀察亦得皆是你做工夫處一切處是你證入處但一處精專日來月往須被你打發去如要學道十二時中須是先去却無明人我人我乃庸人之事勸諸人不要粗心日夜行持做個向上人縱然不悟亦是高尚之士既來叅禪莫將妄想卜度但退步看須會去有般兄弟不受整理硬將生死業識來用將粥飯習氣來用問著則瞠眼進前退後舉坐具在髑髏皮袋裏昏昏地認個識情此不可救你但放下了退步來看方會又有般上座道我都不作道理都無計較不著聲色不依染淨聖凡迷悟一道清虛大光明中都無是事此又被智光蓋却著在智邊亦不可救有此兩般病前病猶淺後病更深你但肯拈放一邊退步看亦自然會去先聖道法法本來法雲門拈拄杖云不是本來法若如是則三毒四倒五蘊六入十二處十八界二十五有不是本來法何不恁麼會取多少省力佛法是個最省力底事何嘗不現前自是你不會又向你道無法無非法何於一法中有法有不法秖為馳求不息了一切處皆是馳求思惟道理也是馳求看古人公案也是馳求看禪冊子也是馳求假饒靜坐念念不住亦是馳求要會麼則你那馳求便是不馳求個中極難信人難做工夫不安樂者蓋為你等不沈則掉所以道不會去如今如何得不沈不掉則你那一念起是生滅流轉為是業識耶為是不動耶恁麼翻覆看來便有些子道理先師曾到李提刑宅提刑請就書閣中燒香了將傳燈錄白先師某雖俗人素留心此道每看此錄多有不會處一一望和尚開示先師云此事不如是理會須有省悟始得若有悟處無不會者自不消問人若無省悟秖那會處亦未是在今之學人事作一邊理作一邊所以致令身心不得安樂何不且教事常順理去未說無始劫來事秪據一念入母胎頓變根身器界自是己來莫不皆是事一報身中種種何嘗有一法不是事者如今如何消遣此個事得順理去古人一得其理了事便如理融通去何不且去十二時中恁地觀究做得者般工夫久久成熟自然與理相應祖師道要急相應唯言不一不秪說了便了要得相應始得溈山道事理不二真佛如如多見不能順去把來一時顛倒了空理會古人言語公案差別問難節記門庭以為叅學苦哉苦哉去聖時遙人多懈怠尋常說正法像法末法山僧道法無正像末佛法常在世間得時便是正法失時便是像末法悟心見性當如雪峰玄沙履實踐真當如南泉趙州近世多以問荅為禪家家風不明古人事一向逐末不反可怪可怪昔人因迷而問故問處求證入得一言半句將為事究明了徹去不似如今人胡亂問趂口荅取笑達者十二時中學道無頃刻棄捨此人縱未得入念念已是修行也今時人全無定力復不開智眼所有機緣語句秪成諍論生滅心行今生出來自肯學道者蓋夙生曾種善根素有根本便解發心亦解疑著就己尋究又煩惱障薄有因有緣此人易可化度若未熏得此心正信不生縱聞之亦不生疑但如風過耳勸之又生瞋加誹謗此又何緣得顯露所以千人萬人中但一二人而已若自解作活計收拾得上生生從此去展轉明利更不退失功德一生勝一生入他諸佛閫域常與此事相應人間天上亦秪如此設對五欲八風一切境界與理符合不行三塗道一味平等正知見復有何事生死不可不畏須了此一段死生情偽始得安樂無過身心為累耳身如桎梏當知身去來處心如猿猴當知心起滅處此二自何處去來起滅則身心圓明內外一如而已且心為內身則為外身為內物為外國師曰身心一如身外無餘則不見有生死當情可謂解脫大道也故能令人見聞不得不脫妄想不得不息物境不得不融復奚疑哉三自省察一是身壽命如駒過隙何暇閒情妄為雜事既隆釋種須紹門風諦審先宗是何標格二道業未辦去聖時遙善友師教誠不可捨自生勉勵念報佛恩唯己自知大心莫退三報緣虛幻不可強為浮世幾何隨家豐儉苦樂逆順道在其中動靜寒溫自愧自悔大隨禪師云上代諸德莫非求實不自瞞昧豈比飛蛾投火自傷自壞此身難得胎卵易成况是釋子之徒又乃祖宗苗裔三衣覆體曩劫修來四事供須非從今日人前行相總似高僧乃至語言不如俗子稱名便是傳法沙門子細尋思還傳個甚麼一向毀他經教有目如盲純乃謗於祖宗有心秪如木石不解忖己德行終日恣縱無明以無慚愧之心兀兀何曾覺悟此身若失永劫沈淪非但却復人身有福底畜生也難得莫向口頭取俊他時人天眼目者非是一生兩生修來蓋是恆沙劫功成果滿始得如是所以向你叢林裏示現下來秪圖你今時人勤苦修行秪恐你出家人失却人身莫等閒過日直饒心超聖境身是凡夫又乃假借增修今時人便去向裏許埋沒却人身諸人莫謾向口頭裏無碍却成謗佛毀法問毀佛謗僧時如何荅僧有何過佛辜負你個什麼你毀謗他上堂云此性本來清淨具足萬德但以隨染淨二緣而有差別故諸聖悟之一向淨用而成覺道凡夫迷之一向染用沒溺輪廻其體不二故般若云無二無二分無別無斷故時僧問劫火洞然大千俱壞未審此個性壞不壞師云壞進云恁麼則隨他去也師云隨他去也僧無語後至投子處舉之投子呼侍者裝香大展坐具望西川大隨山遙禮三拜嘆曰伊是個古佛此乃真善知識速往彼懺悔叅取於是僧便回大隨和尚已歸寂復回投子投子亦乃歸寂老僧行脚時到於諸方經冬過夏未省時中空過向溈山會裏做飯七年於洞山會中做柴頭三年重處即便先去秪是了得自己干他人甚事如諸佛菩薩盡是勤苦不計劫數捨金輪寶位頭目髓腦國城妻子所愛之物不可算數所以始得名為佛似諸闍黎還曾捨得個什麼作得個什麼勤苦更道我會出世間法世間法尚不會些些子境界現前便自張眉怒目消容不得說什麼解脫法投子同禪師云無量劫來閒處著急向自己處却閒所以難得相稱蓋緣日夕一切處路熟却到自己緊急處便懈怠去便不欲得去所以辛苦過在阿誰切莫因循各自辦事作麼生辦向一切處辦今後不得取次過日各自取靜莫說閒話去鼓山宴禪師云大事未辦宗脉不通切忌記持言句意識裏作活計不見道意為賊識為浪盡被漂淪沒溺去無自由分必若大事未通不如休去大歇去身心純靜去好時中莫駐著事却易得露洞山初禪師云智有邪正道有虛偽多只與麼心機意識認得門前屋後底學得路布葛藤一堆一擔蘊在胸襟道我會禪會道還夢見禪道也未喚作打頭不遇作家到老只成愲懂若為你解粘去縛道眼分明甄別是非堪為師匠即便抝折拄杖高掛鉢囊取個徹頭莫愁不成辦或若開口動舌說向上向下者邊那邊玄會妙會道出道入君臣父子明體明用盡是謗般若埋沒宗風不識好惡尿牀鬼子帶累後人無有了日更向其中叉手並脚唱喏撮他野狐涎唾自肯自重云得和尚為我揀為我說得個安樂處還睡覺也未還灑灑也未喚作病不遇良醫悞服他毒藥認得個驢鞍橋喚作阿爺下頷與你本分事有什麼交涉將知你一生行脚只是踏破草鞋始終成得個不唧溜漢雲峰悅禪師上堂云即今休去便休去若覓了時無了時此事若向言語上作解會意根下卜度天地懸殊大丈夫一刀兩段猶未相應豈况被人喚去方丈裏塗糊指注舉楞嚴肇論根塵色法向上向下有無得失他時後日死不得其地近世更有一般宗匠二三十年馳聲走譽只管教人但莫尚他言語喚作透聲色便問東荅西以為格外之句將此狂解遞相沿襲混傷宗教誑惑後生苦哉苦哉我王庫中無如是刀總若似與麼行脚清風月下守株人狡兔漸遙芳草綠諸禪德去聖時遙人心淡薄看却今之叢林更是不得也所在之處或聚徒三百五百浩浩地只以飯食豐濃寮舍穩便為旺化也中間孜孜為道者無一人設有十個五個走上走下半青半黃會即總道我會各各自謂握靈蛇之寶孰肯知非洎乎挨拶鞭逼將來直是萬中無一苦哉苦哉所謂般若叢林歲歲凋無明荒草年年長就中今時後生纔入眾來便自端然拱手受他別人供養到處菜不擇一莖柴不搬一束十指不霑水百事不干懷雖則一期快意爭奈三塗累身豈不見教中道寧以熱鐵纏身不受信心人衣寧以洋銅灌口不受信心人食上座若也是去直饒變大地作黃金攪長河為酥酪供養上座未為分外若也未是至於滴水寸絲便須披毛戴角牽犁拽耙償他始得諸上座光陰可惜時不待人莫待一朝眼光落地菑田無一簣之功鐵圍陷百刑之痛莫言不道珍重近代佛法可傷多棄本逐末背正投邪莫認古人一切言句為禪為道有甚干涉直饒達磨西來亦無禪可傳只要大眾自悟自成佛自建立一切禪道况神通變化眾生本自具足不假外求如今人多是外求蓋根本自無所悟一向客作數他人珍寶都是虛妄終不免生死輪轉一切眾生總一般妙明日用更無偏等閒却被邪師指剛道西來別有禪近有無盡居士曰大都此物非他物豈有南宗與北宗如今衲子多是爭南宗北宗雲門臨濟却被個俗漢子點破不勝懡㦬瑯琊覺禪師云汝等諸人在我這裏過夏與你點出五般病一不得向萬里無寸草處去二不得孤峰獨宿三不得張弓架箭四不得物外安身五不得滯於生殺何故一處有滯自救難為夫叅學人須是不滯於性相始得若談於性即滯於相若談於相即滯於性者裏須是性相都冺理事混融方解即事即理即性即相如拳十指展縮自由佛照禪師對宋孝宗云但念念叩己而叅驀然一念相應如桶底子脫相似直至成佛永無退轉又云佛法至妙無有窮已如有窮已則成住著纔成住著便有窠臼瑯琊謂子璿講師曰汝宗不振久矣宜勵志扶持報佛恩德勿以殊宗為介也後住長水承稟日顧眾曰道非言象得禪非擬議知會意通宗曾無別致圓照本禪師曰歲月不可把玩老病不與人期唯勤修勿怠是真相為法安禪師住武寧延恩寺草屋數楹敗牀破簀師安樂之縣令糾豪右謀為一新師笑曰檀法本以度人今非其發心而強之是名作業不名佛事也棲止十年而叢林成僧至如歸師與法雲秀為昆弟且相得秀所居莊嚴妙天下說法如雲雨嘗以書招師師讀之一笑而已或問其故師曰吾始見秀有英氣謂可以語道乃今而後知其癡癡人正不可與語也問者曰何哉師曰比丘法當一鉢行四方既不能爾又於八達衢頭架大屋從人乞飯以養數百閒漢非癡乎師每謂人曰萬事隨緣是安樂法福嚴宗禪師上堂云世尊周行七步舉足全乖目顧四方觸途成滯金襴受去殃及兒孫玉偈傳來挂人脣吻風幡悟性未離色塵鉢水投針全成管見祖師九年面壁不見纖毫盧公六代傳衣圖他小利江西一喝不解慎初德嶠全施未知護末南山鼈鼻謾指踪由北院枯松徒彰風彩雲門顧鑒落二落三臨濟全提錯七錯八若說君臣五位直如紙馬過江更推賓主交叅恰似泥人澡洗獨超象外且非捉兔之鷹混迹塵中未是齩猪之狗何異跳坑墮壍正是避溺投罟如斯之解正在常途出格道人如何話會杭州淨住院居說真淨禪師參達觀問曰某甲經論粗明禪直不信願師决疑觀曰既不信禪豈可明經禪是經綱經是禪綱提綱正網了禪見經師曰為某甲說禪看觀曰向下文長師曰若恁麼經與禪乃一體觀曰佛及祖非二心如手搦拳如拳搦手師因有省乃成偈曰二十餘年用意猜幾翻曾把此心灰而今潦倒逢知己李白元來是秀才東京善本禪師示眾曰上士聽法以神中士聽法以心下士聽法以耳且道更有一人來將什麼聽乃拈拄杖卓禪牀一下曰高也著低也著落落圓音徧寥廓十方內外更無他不用無繩而自縛師所至見畫佛菩薩行立之像不敢坐素饌以魚胾名者皆不食其精誠敬事防心離過類如此韶山果禪師示眾云七月孟秋猶熱古往今來時節若作佛法商量正是弄巧成拙若作無事話會又與外道何別直饒總不如斯敢保老兄未徹如來言祖師訣無孔鐵鎚重下楔自家心地亂如麻却把指頭喚作月莫思量休解說千年枯骨休咬囓從他兔走與烏飛饑來喫飯困來歇黃魯直太史與胡少汲書云公道學頗得力耶治病之方當深求禪悅照破生死之根則憂畏婬怒無處安脚病既無根則枝葉無能為害投子聰和尚海會演和尚皆出世宗師道行高重不愧古人皆可親近且勝從文章之士學妄言綺語增長無明種子也聰老尤喜接高明士大夫開懷議論便穿得諸儒鼻孔若於義理得宗趣却觀舊讀諸書境界廓然六通四闢極省心力也然有道之士須以至誠懇惻歸向古人所謂下人不真不得其精此非虛語晦堂寶覺禪師往謁泐潭月禪師月以經論精義入神聞諸方同列笑之以為下喬木入幽谷師曰彼以有得之得護前遮後我以無學之學朝宗百川馬祖百丈以前無住持事道人相尋於空閒寂寞之濱而已其後雖有住持王臣尊禮為人天師今則不然挂名官府如有戶籍之民此豈可復為也謂潭州守謝師直曰三乘十二分教還同說食示人食味既因他說其食要在自己親嘗既自親嘗便能了知其味是甘是辛是鹹是淡達磨西來直指人心見性成佛亦復如是真性既因文字而顯要在自己親見若能親見便能了知目前是真是妄是生是死反觀一切語言文字皆是表顯之說都無實義如今不了病在見聞覺知為不如實知真際所詣認此見聞覺知為自己所見殊不知此見聞覺知皆因前塵而有分別若無前塵境界即此見聞覺知還同龜毛兔角並無所歸偈曰不住唐朝寺閒為宋地僧生涯三事衲故舊一枝藤乞食隨緣去逢山任意登相逢莫相笑不是嶺南能真淨文禪師王荊公問經云一切眾生皆證圓覺而圭峰以證為具謂譯者之訛何如師曰圓覺如可改維摩亦可改也維摩豈不云亦不滅受蘊而取證夫不滅受蘊而取證與皆證圓覺之意同蓋眾生現行無明即是如來根本大智圭峰之言非是邵武英禪師云直饒棒頭薦得不是丈夫喝下承當未為達士那堪更向言中取則句裏馳求語路尖新機鋒捷疾如斯見解盡是埋沒宗旨玷污先賢於吾祖道何曾夢見福州延慶洪準禪師久從南禪師遊聞人之善如出諸己喜氣洋洋生眉宇間聞人之惡必合掌扣空若自追悔者見者莫不笑之而師真誠始終一如壽逾八十日夕無他營為眠食之餘唯吟梵音贊觀世音而已臨終時門人皆赴檀越供唯一僕夫在師携磬坐土地祠前誦孔雀經一遍告別即歸室安坐瞑目而逝三日不傾鄉民來觀者如堵師忽開目而笑使坐於地有頃門人還師呼立其右握手如炊熟久視之寂然去矣禾山德普禪師解唯識起信論號義虎罪圭峰疏義多臆說摘其失處誡學者不可信老宿皆數之云圭峰清涼國師所印可汝敢雌黃蚍蜉撼樹汝今是矣師歎曰學者以名位惑久矣清涼圭峰非有四目八臂也奈何甘自退屈乎後參黃龍南得旨將去世半月前先令眾次第辦祭受祭畢乃焚香坐逝歸宗芝菴主結茅絕頂偈曰千峰頂上一間屋老僧半間雲半間昨夜雲隨風雨去到頭不似老僧閒開先瑛禪師云木中有火不鑽不出沙中有金不淘不得心中有道不覺不悟遊方行脚喚作道人還曾悟麼良久曰白日莫閒過青春不再來潭州隆禪師云若未曾須是叩己而參直要真實不得信口掠虛徒自虛生浪死靈源清禪師曰今之學者未脫生死病在偷心未死耳然非其罪為師者之罪也如漢高帝紿韓信而殺之信雖死其心果死乎古之學者言下脫生死効在甚麼處在偷心已死然非學者自能爾實為師者鉗鎚妙密也如梁武帝御大殿見侯景不動聲氣而景之心已枯竭無餘矣諸方所說非不美麗要之如趙昌畫花花雖逼真而非真花也黃龍示草堂清禪師曰子見猫兒捕鼠乎目睛不瞬四足踞地諸根順向首尾一直擬無不中子誠能如是心無異緣六根自靜默然而究萬無一失也又曰得道非難弘道為難弘道猶在己說法為人難既明之後在力行之覺範洪禪師嘗自謂識不知微道不勝習黃山谷贈以詩曰不肯低頭拾卿相又能落筆生雲烟圓通秀謂黃山谷曰汝以艷語動天下人婬心不止馬腹中正恐生泥犁耳黃悚然悔謝著發願文痛戒酒色但朝粥午飯而已依晦堂得個省處被死心所拶無語應之後左遷黔南於無思念中頓明大旨乃以書報死心曰往年嘗蒙苦苦提撕長如醉夢依稀在光影中蓋疑情不盡命根不斷故望崖而退耳謫官在黔南道中晝臥覺來忽爾尋思被天下老和尚瞞了多少唯有死心道人不肯乃是第一相為也清素禪師久參慈明寓居一室未始與人交兜率悅食蜜浸荔枝師偶過門悅呼曰此老人鄉果也可同食之師曰自先師亡後不得此食久矣悅問先師為誰師曰慈明也某忝執侍十三年耳悅乃疑駭曰十三年堪忍執侍之役非得其道而何遂饋以餘果稍稍親之師問悅所見何人曰洞山文又問文見何人曰黃龍南乃曰南匾頭見先師不久法道大振如此悅益疑駭遂袖香詣師作禮師起避之曰吾以福薄先師授記不許為人悅益恭師乃曰憐子之誠違先師之記子生平所得試語我悅具通所見師曰可以入佛而不能入魔悅曰何謂也師曰豈不見古人道末後一句始到牢關如是累月師乃印可仍戒之曰文示子者皆正知正見然子離文太早不能盡其妙吾今為子點破使子受用得大自在他日切勿嗣吾也悅後嗣真淨文佛照杲禪師云西來祖意教外別傳非大根器不能證入其證入者不被文字語言所轉聲色是非所迷亦無雲門臨濟之殊趙州德山之異湛堂準禪師幼不喜聞酒胾八歲辭家習經輒熟伸辨詳明既剃髮往依梁山乘禪師呵曰驅烏未受戒敢學佛乘乎師捧手曰壇場是戒耶三羯磨梵行阿闍黎是戒耶乘大驚師曰雖然敢不受教遂受戒於唐安律師徧遊成都講肆後得法於真淨寶華普鑑禪師云參禪別無奇特秪要當人命根斷疑情脫千眼頓開如大洋海底輥一輪赫日上升天門照破四天之下萬別千差一時明了便能握金剛王寶劒七縱八橫受用自在豈不快哉如或見諦不真影像髣髴尋言逐句受人指呼驢年得快活去不如屏淨塵緣豎起脊梁骨著些精彩究教七穿八穴百了千當向水邊林下長養聖胎亦不枉受人天供養西蜀鑾法師問佛照曰禪家言多不根何也照曰汝習何經論荅曰頗通百法照曰秪如昨日雨今日晴是甚麼法中收師懵然照曰莫道禪家所言不根好師憤曰昨日雨今日晴畢竟是甚麼法中收照曰第二十四時分不相應法中收師恍悟禮謝龍牙密禪師上堂云休把庭花類此身庭花落後更逢春此身一往知何處三界茫茫愁殺人圓通旻禪師上堂云諸佛出世無法與人秪是抽釘拔楔除疑斷惑學道之士不可自瞞若有一疑如芥子許是汝真善知識喝一喝曰是甚麼切莫刺腦入膠盆大慧杲禪師見曹洞宗臂香傳授以表不妄付囑心非之曰禪有傳授豈佛祖自證自悟之法遂去之湛堂謂師曰教你說也說得教你做也做得拈古頌古小參普說總得你只欠㘞地一下所以說時有不說時便無入方丈時有出方丈時便無惺惺時有睡著便無如何敵得生死師云正是宗杲疑處湛堂病革囑令見圓悟勤師後方徹悟圓悟常言近來諸方盡成窠窟五祖下我與佛鑑佛眼三人結社參禪如今早見漏逗出來佛鑑下有一種作狗子呌鵓鳩鳴取笑人佛眼下有一種覻燈籠露柱指東話西如眼見鬼一般我者裏且無此兩般病痛師曰大好無病痛圓悟曰何謂也師曰擊石火閃電光引得無限人弄業識舉了便會了豈不是佛法大窠窟圓悟不覺吐舌師嘗語僧俗言參得禪了凡讀經看文字如去自家屋裏行一遭相似又如與舊時相識底人相見一般若欲以文字語言糟粕求無有是處語教忠光禪師曰如人斫樹根下一刀則命根斷矣汝向枝上斫其能斷命根乎今諸方浩浩說禪者見處總如此何益於事又曰別人死了活不得汝今活了未曾死要到大安樂田地須是死一回始得又謂提刑吳偉明曰不須呈伎倆直須啐地折嚗地斷方敵得生死若秪呈伎倆有甚了期白楊順禪師示眾云染緣易就道業難成不了目前萬緣差別秪見境風浩浩凋殘功德之林心火炎炎燒盡菩提之樹道念若同情念成佛多時為眾一似為己彼此事辦不見他非我是自然上敬下恭佛法時時現前煩惱塵塵解脫佛眼命世奇首座分座奇固辭曰此非細事也如金針刺眼毫髮若差睛則破矣願生生居學地而自𤊳煉眼乃以偈美之法常首座辭世詞曰此事楞嚴嘗露布梅花雪月交光處一笑寥寥空萬古風甌語迥然銀漢橫天宇蝶夢南華方栩栩珽珽誰跨豐干虎而今忘却來時路江山暮天涯目送飛鴻去佛燈禪師謂待制潘良貴曰如今士大夫說禪說道秪依著義理便快活大率似將錢買油餈喫了便不饑其餘便道是瞞他亦可笑也窮谷璉禪師曰者一段事不在有言不在無言不礙有言不礙無言古人垂一言半句正如國家兵器不得已而用之橫說豎說秪要控人人處其實不在言句上今時人不能一徑徹證根源秪以語言文字而為至道一句來一句去喚作禪道喚作向上向下謂之菩提涅槃謂之祖師巴鼻正似鄭州出曹門圓悟示張持滿曰此既已明當須踐履但只退步愈退愈明愈不會愈有力量異念才起擬心才生即猛自割斷令不相續則智照洞然步步踏實地豈有高低憎愛違順揀擇於其間哉無明習氣旋起旋消悠久間自無力能擾人也古人以牧牛為喻誠哉所謂要久長人耳直捷省要最是先忘我見使虛靜恬和於一切法皆無取捨佛見法見尚不令起則塵勞業識自當氷消瓦解趙州三十年除二時粥飯是雜用心處香林四十年方成一片從上古人無不皆如此密密履踐安可計得失長短取捨是非知解也何止此生而已窮未來際證無量聖身也未是他泊頭處但一味退步切莫作限量也示吳教授云探究此事要透死生豈是小緣應當猛利誠志信重如救頭然始有少分相應多見參問之士世智聰明只圖資談柄廣聲譽以為高上趣向務以勝人但增益我見如以油投火其燄益熾直到臘月三十日茫然謬亂殊不得纖毫力送圓首座云古德道如人學射久久方中悟則剎那踐履工夫須資長遠如鵓鳩兒初生下來赤骨厯地養來餵去日久時深羽毛既就便解高飛遠舉所以悟明透底正要調伏又云佛祖出興特唱此段大因緣秪貴一聞千悟直下承當了修行不求名聞利養唯務透脫生死看他古來有道之士動是降龍伏虎與神明受戒攻苦食淡大忘人世永謝塵寰三二十年遁迹理名往往坐脫立亡於中一個半個諸聖推出建立宗風無不稟高行務報佛恩當宜師法之轉相勉勵追復古風切忌希名苟利茲深祝也示韓朝議云須令此心長時現前不隨沈昏不生聰慧入平等安閑寂靜境界那有惡作業緣識情千撓得此本妙光明也只恐臨境界現前都盧忘失依前紛亂則不堪也古之修行亦只以自所證入時中照了截斷塵勞悠久三二十年純熟超出生死不為難著力在行處不只空高談說之而已若或立勝見負我能即禍事也示眾云佛見法見尚自不起何况更起世間情想分別妄緣諸業教中道是法非思量分別之所能解又云以有思惟心測度如來圓覺境界如取螢火燒須彌山終不能著祖師道但盡凡情別無聖量凡情盡處聖量現前直須頓歇妄緣無念無為放教虛靜千聖萬聖未有不從此門而得入者只在存誠堅固努力向前但辦肯心必不相賺若見刺不除得失是非關念則永無交涉佛法本無彼此諸家總是六祖下兒孫終不說我是臨濟下人須得我家宗派盛傳寧可粉骨碎身終不作此見解放下人我擔子千休萬歇方可生死奈何他不得若只尋見尋聞求知求解只成個生死根本若是隨言逐句作道理滿肚皮是禪何時脫得去僧問溈山如何是道師曰無心是道曰某甲不會師曰會取不會底好曰如何是不會底師曰秪汝是不是別人復曰今時人但直下體取不會底正是汝心正是汝佛若向外得一知一解將為禪道且沒交涉名運糞入不名運糞出污汝心田思𨜶問仰山曰禪宗頓悟畢竟入門的意如何師曰此意極難若是祖宗門下上根上智一聞千悟得大總持其有根微智劣若不安禪靜慮到者裏總須茫然曰除此一路還更有入處否師曰有曰如何即是師曰汝是甚處人曰幽州人師曰汝還思彼處否曰常思師曰能思者是心所思者是境彼處樓臺林苑人馬駢闐汝返思的還有許多般也無曰某甲到者裏總不見有師曰汝解猶在心信位即得忍位未在曰除却者個別更有意也無師曰別有別無即不堪也曰到者裏作麼生即是師曰據汝所解只得一玄得座披衣向後自看物初觀禪師示眾曰過去加是如是見在如是如是未來如是如是幸自可憐生無端黃面老漢拈花金色頭陀微笑漏泄真機一人傳虛萬人傳實雖然古人得親用親說到行到豈是末流刻楮畫花雕蚶鏤蛤瞎學者眼頌古聯珠通集徑山希陵跋云青蓮瞬視金色笑微師承肇茲密著少林華敷神光印受世系由是彌彰雖枝派之有殊分然機用之無二致或縱奪而破古人之幽鍵或捭闔而發後學之靈樞大用現前纖塵不立四句獨超於言外萬法俱泯於聲先玉振禪宗珠聯祖域流通雖遠選擇未純識者尚譏况於後乎錢塘魯菴會公孤標拔俗積行熏心遐扣祖機深染法味采機緣而補前闕綴頌古而入新刻通集後先洞照今古用心亦閎矣謹遣清侶躬索後題慚窺管而見微聊濡毫而塞請延祐戊午季夏靈隱湻朋跋云宗門中有一千七百則公案名之今古又曰長物言之則汙人脣齒置之則廻避無門句句玉轉珠廻字字氷消瓦解歷代宗匠頌之未免畫蛇添足寶鑑師編輯於前魯菴公增收於後贓證分明不勞再勘中間一處淆訛具眼衲僧必能辨白曹山智照禪師看經次有問禪僧心不掛元字脚何得多學師曰文字性異法法體空迷則句句瘡疣悟則文文般若苟無取捨何害圓伊龜洋慧忠禪師曰眾生不能解脫者情累耳悟道易明道難但脫情見其道自明矣夫明之為言信也如禁蛇人信其咒力藥力以蛇綰弄揣懷袖中無難未知咒藥等力者怖駭棄去但諦見自心情見便破今千疑萬慮不得用者未見自心者也死心新禪師上堂云清珠下於濁水濁水不得不清念佛投於亂心亂心不得不佛佛既不亂濁水自清濁水既清功歸何所良久曰幾度黑風翻大海未曾聞著釣舟傾咦庵鑑禪師云老胡開一條路甚生徑直秪云歇即菩提性淨明心不從人得後人不得其門一向奔馳南北往復東西極歲窮年無個歇處護聖居靜禪師示眾曰參學至要不出先南堂道最初句及末後句透得過者一生事畢倘或未然更與你分作十門各各印證自心還得穩當也未一須信有教外別傳二須知有教外別傳三須會無情說法與有情說法無二四須見性如觀掌中之物了了分明一一田地穩密五須具擇法眼六須行鳥道玄路七須文武兼濟八須摧邪顯正九須大機大用十須向異類中行凡欲紹隆法種須盡此綱要方坐得者曲盝牀子若不到恁麼田地秪一向虛頭異時閻羅老子未放你在法海觀瀾卷第四目錄密宗要典妙臂菩薩所問經蘇婆呼童子經蘇悉地羯羅經金剛頂瑜伽念珠經持明藏尊那菩薩大明成就儀軌經
