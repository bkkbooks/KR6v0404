body:
  text: 古吳蕅益比丘智旭輯中山湯學紳康民閲梓教觀警策大方廣佛華嚴經問明品云若欲求除滅無量諸過惡當於佛法中勇猛常精進又云非但以多聞能入如來法如人水所漂懼溺而渴死於法不修行多聞亦如是如人設美饌自餓而不食如人善方藥自疾不能救如人數他寶自無半錢分如有生王宮而受餒與寒如聾奏音樂悅彼不自聞如盲繢衆像示彼不自見譬如海船師而於海中死於法不修行多聞亦如是如在四衢道廣説衆好事內自無實德不行亦如是須彌山頂偈讚品云譬如暗中寶無燈不可見佛法無人説雖慧莫能了十地品云禪善巧決定觀察智不離善巧多聞菩薩如是觀察了知已倍於正法勤求修習日夜唯願聞法喜法樂法依法隨法解法順法到法住法行法又云得聞法已攝心安住於空間處作是思惟如説修行乃得佛法非但口言而可清淨離世間品云若諸菩薩不如説行當知是人於佛菩提則為永離是故菩薩應如説行入法界品普賢菩薩云我法海中無有一文無有一句非是捨施轉輪王位而求得者非是捨施一切所有而求得者善男子我所求法皆為救護一切衆生入不思議解脫境界普賢行願品云牛飲水成乳蛇飲水成毒智學成菩提愚學為生死如是不了知斯由少學過是故我國人多聞無厭怠又云菩薩不但以聞思慧解而能證入一切法門具足十法得此解脫一者遠離諸不善法二者不違如來制戒三者遠離一切慳嫉四者供養一切如來五者勤修一切福業六者具足智慧七者具足方便八者具足大願九者具足厭離十者具足精進增益阿含經云雖誦千章不義何益不如一義聞可得道長阿含經云若有比丘為人説法作如是念我為彼人而説於法當令彼人信敬於我能多與我飲食衣服病瘦醫藥若作是説者是名不淨若有比丘為人説法欲令聽者證解佛法除現在苦離諸煩惱不擇時節導示善趣為其顯現乃至能令智者自知不從他教離於生老病死憂悲苦惱能令聽者聞其所説如説修行為令聽者於長夜中得法得義得利得安如是説者名為清淨慈悲之説憐愍利益欲使正法得久住故正法念處經云若人能説法利益於他人其人如父母示以涅槃城若為他人説一句之善法則為善導師為衆生所尊又云一切善法勝根本者所謂覺法一切法覺要因聞法若不聞法於法不覺又云聽法功德出生死中最為第一雜阿含經云不因説法故受彼食而食但為利益他説法不受食大寶積經三律儀會云復次迦葉當於爾時有人詐現修菩薩行便自顯揚生於放逸生放逸已謂勝獨覺及阿羅漢住於非理名不可治當墮惡趣菩薩藏會云多聞解了法多聞不造惡多聞捨無義多聞得涅槃善聽增長聞聞能增長慧慧能修淨義得義多招樂聰慧得義已證現法涅槃聞法淨黠慧證得第一樂又云若諸含識於菩薩藏微妙法門雖復聽聞而不如理方便作意當知是人於彼聖道不能正行又云舉要言之如來所演八萬四千法藏聲教皆名為文諸離一切言音文字理不可説是名為義文殊師利授記會云菩薩説法心無所著則能攝受十種功德一者不生惡欲二者不求他人識知三者不起名聞心四者於檀越家心不繫著五者不占護他家六者於極下劣四事供養而生喜足七者説法令他信受八者善神守護九者不生邪覺十者起念佛心富樓那會云受持讀誦如所説行是名第一供養於佛授幻師跋陀羅記會云有四法多聞無厭一者增長自他正智慧故二者於他疑惑能斷除故三者於佛正法能攝受故四者於諸如來讚無盡故復有四法多聞堅實一者聞正法已能善解了二者聞正法已不作諸惡三者聞正法已為他開示四者聞正法已回向菩提復有四法令他信樂所説之法一者心少欲故二者常知足故三者語柔軟故四者身順法故又云復有四法得淨辨才一者於説法人無所違逆二者尊重法師恭敬聽受三者不以多聞而自憍慢四者於少聞人不生輕賤摩訶迦葉會云若滿三千大千世界珍寶樂具施諸衆生若有為他人説一四句偈令其得聞所得功德勝前功德無量無邊阿僧祇數何以故珍寶樂具不能令人離於生老病死憂悲苦惱惟有正法能大利益離於生老病死憂悲苦惱復次若有菩薩以滿無邊世界珍寶施諸如來若有菩薩以大悲心為一衆生説四句偈功德勝彼淨信童女會云菩薩成就八種法故得陀羅尼辨才無礙一者尊重法二者承事和尚阿闍黎三者求法無厭四者如聞演説五者不慳吝法六者不揚他惡七者愛敬法師如和尚八者不見他過勸離過普明菩薩會云菩薩有四法退失智慧不尊重法不敬法師所受深法祕不説盡有樂法者為作留難説諸因緣沮壞其心憍慢自高卑下他人有四法得大智慧常尊重法恭敬法師隨所聞法以清淨心廣為人説不求一切名聞利養知從多聞生於智慧勤求不懈如救頭然聞經誦持樂如説行不隨言説又云譬如有人漂沒大水渴乏而死有諸沙門多讀誦經而不能止貪恚癡渴法水漂沒煩惱渴死墮諸惡道譬如藥師持藥囊行而自身病不能療治多聞之人有煩惱病亦復如是雖有多聞不止煩惱不能自利文殊師利所説不思議佛境界經云多聞以八法而得清淨一者敬順師長二者摧伏憍慢三者精勤記持四者正念不錯五者説釋無倦六者不自矜伐七者如理觀察八者依教修行自在王菩薩經云一切諸經皆是了義以依義故一切法不可説故菩薩如是名為依了義經若人於一切經不能如是依義是名不了義何故名不了是人不了義故行塵垢道常為物牽為誰所牽為聲所牽了義者不隨於聲大方等大集月藏經云若有衆生唯依讀誦欲求阿耨多羅三藐三菩提者是人多喜著於世俗以世俗故尚不能調己心煩惱何能調伏他人煩惱善男子善女人樂著讀誦求菩提者便有嫉妒求名利富貴高心自是輕慢毀他以自高故尚不能得欲界善根何况能得色無色界一切善根又不能得聲聞菩提何况能得辟支佛道及無上菩提佛説大乘入諸佛境界智光明莊嚴經云若見緣生即能見法若能見法即見如來彼諸所見若其如理審伺察時是中亦無少法可見又云如其虛空菩提亦然如其菩提諸法亦然如其諸法衆生亦然如其衆生剎土亦然如其剎土涅槃亦然此説即是涅槃平等為一切法畢竟邊際清淨之因無對治離對治因本來清淨本來無垢本來無著如來了知彼一切法如是相故現成正覺然後觀察諸衆生界建立清淨無垢無著遊戲法門以是名字於諸衆生大悲心轉地藏十輪經云三乘皆應修學不應憍慢妄號大乘謗毀聲聞獨覺乘法偈曰癡慢號大乘彼無有智力尚迷二乘法况能解大乘譬如闕壞眼不能見衆色如是闕壞信不能解大乘無力飲池河詎能吞大海不習二乘法何能學大乘先信二乘法方能信大乘無信誦大乘空言無所益內懷真斷見妄自號大乘不護三業罪壞亂我正法彼人命終後定墮無間獄又云譬如有人癡狂心亂為作音樂不能了知如是衆生於二乘法未曾修學貪瞋癡等猛利煩惱擾亂其心執著無因及斷滅論根機未熟為説大乘雖經多時而不能解譬如有人不著甲胄不持刀杖輒入陳中必遭傷害受諸苦惱如是衆生於二乘法未曾修學智慧狹劣根器未成為説大乘必生妄執由此展轉造惡無窮如是癡人不久便當肢體廢缺於多日夜結舌不言受諸苦毒痛切難忍命終定生無間地獄於諸惡趣輪轉往來又云夫大乘者受持第一清淨律儀修行第一微妙善行具足第一堅固慚愧深見深畏後世苦果遠離所有一切惡法常樂修行一切善法慈悲常遍一切有情恆普為作利益安樂救濟度脫一切有情所有厄難生死衆苦不顧自身所有安樂惟求安樂一切有情如是名為住大乘者又云若不修行十善業道設經十方一切佛土微塵數劫自號大乘或説或聽或但發心或發誓願終不能證菩提涅槃亦不令他脫生死苦賢護經云夫求法者師若有須乃至應當自割其身肌膚肢體供養於師師若須命尚無愛惜况餘外物思益梵天經云是法無餘能報惟有一事如説修行若人於此法中能如説修行者是名能報師恩乃至是名轉於法輪月燈三昧經云雖廣讀衆經恃多聞毀禁多聞非能救破戒地獄苦自恃持戒慢而不學多聞持戒報盡已還復受諸苦多聞與持戒二俱不自恃恃慢薄福人由是起衆苦大法炬陀羅尼經云法師應勤精進速滅無明亦勸他離常當如是思惟我今所處即是如來師子之座隨彼衆生一切問難我當解釋皆令歡喜作是念已諸有諍論彼我之心自然消滅復次法師常應慈愍愛語謙下將護衆心何以故若懷瞋妒心存勝負獲大重罪慈心説法成大功德能令佛法久住於世凡所生處常得值遇諸佛菩薩及衆賢聖能消世間種種供養假以高大師子寶座億數無價名衣奉上法師豈能報彼恩德而彼雖受是事應生慚愧勿起貪心應生慈心不得我慢無令消滅施主善根當令衆生咸得歡喜又云若人常説法若人常來聽如是二種人咸得無量福大威德陀羅尼經云汝等當取實義於實義中當勤方便莫為文字莊嚴華手經云菩薩為求法故當學多聞多聞方便其多聞者從他所聞多聞方便者能自思量專心正念從他聞者諸佛所説順道之言所謂十二部經何謂思量專心正念於法方便善知五陰十二入十八界十二因緣從緣生法是白是黑是好是醜分別揀擇皆入法性法相法位如是通達名為正念又云其甚深者即法實相若取法空即是妄取若取無相是則為相若取無願是亦為願法性本來不增不減是則名為深達諸法又云若為衆生演説法時應先稱揚佛之功德衆生聞已或能發心求佛智慧以發心故佛種不斷大報恩經云先自調伏煩惱諸根然後聽法非時不聽至心聽法恭敬説者尊重於法是名菩薩知恩報恩海龍王經云菩薩當學深妙之法若捨深妙法説雜句飾則為斷絶正法之化大般若經云初得無上正等覺時作是思惟我依誰住誰堪受我恭敬供養尊重讚歎作是念時都不見有一切世間若天若魔若梵若沙門若婆羅門人非人等與我等者况當有勝復自思惟我依此法已證無上正等菩提此法微妙甚深寂靜我當還依此法而住供養恭敬尊重讚歎何謂此法所謂般若波羅蜜多憍尸迦我已成佛尚遵如是甚深般若波羅蜜多依止而住供養恭敬尊重讚歎况善男子善女人等欲求無上正等菩提而不於此甚深般若波羅密多至心歸依精勤修學以無量種上妙華鬘塗散等香衣服瓔珞寶幢幡蓋衆妙珍奇妓樂燈明盡諸所有供養恭敬尊重讚歎又云勤求多聞常無厭足於所聞法不著文字又云若菩薩摩訶薩不學一切法終不能得一切智智又云若一善法未能圓滿而得無上正等菩提無有是處又云莫以世利名譽心故隨逐法師但為愛重恭敬供養無上法故隨逐法師又説法師見汝求請甚深般若都不眷念反加凌辱汝於此中不應瞋恨轉增愛重恭敬法心常逐法師勿生厭倦又云復次善現住菩薩乘諸善男子善女人等書寫受持讀誦修習思惟演説如是般若波羅蜜多甚深經時得大名聞恭敬供養所謂衣服飲食臥具醫藥及餘資財是善男子善女人等受著此事退失般若所引無邊殊勝善業當知是為菩薩魔事又云是菩薩摩訶薩心以調伏貪瞋癡及無貪瞋癡遠離貪瞋癡及無貪瞋癡為性為相為狀為貌若成就如是性相狀貌心乃於如是甚深般若波羅蜜多能生淨信及生勝解又云諸菩薩衆常應精進修真事業厭離生死不著三界又云甚深般若波羅蜜多不為非器諸有情説不為外道惡見者説不為懈怠不信者説不為求法貿易者説不為貪愛名利者説不為嫉妒祕吝者説不為生盲聾啞者説又云財施有竭法施無窮又云應淨修持身語意戒何以故為欲引發聞思修故又云諸欲供養佛世尊者當修三法一者發菩提心二者護持正法三者如教修行若能修學此三法者乃得名為真供養佛又云受持此經有十種法一者書寫二者供養三者施他四者諦聽五者披讀六者受持七者廣説八者諷誦九者思惟十者修習又云諸有情類不應保信微少善根謂彼即能脫諸惡趣勤行精進亦不可保乃至於法未具正見於諸惡趣猶有墮落若於正法圓滿修學得順忍已能不復造感惡趣業不復懈怠起順退分於下劣位不恐退轉於所修行心不慢緩大般涅槃經云有四種法為大涅槃而作近因一者親近善友二者專心聽法三者繫念思惟四者如法修行不以聞故得大涅槃以修集故得大涅槃譬如病人雖聞醫教及藥名字不能愈病以服食故能得差病又云寧當少聞能解義味不願多聞於義不了願作心師不師於心大悲經云應學三事一者欲二者精進三者不放逸汝等若住三事我此阿僧祇劫所習無上法寶庫藏則得久住復次阿難我於阿僧祇劫所習阿耨多羅三藐三菩提法三事因緣當有隱沒一者無信二者不住決定之行三者不懺悔十住毗婆沙論云問曰三乘所學皆為無餘涅槃若無餘涅槃中無差別者我等何用於恆河沙等大劫往來生死具足十地不如以聲聞辟支佛乘速滅諸苦答曰是語弱劣非是大悲有益之言若諸菩薩效汝小心無慈愍意不能精勤修十地者諸聲聞辟支佛何由得度亦復無有二乘差別所以者何一切聲聞辟支佛皆由佛出若無諸佛何由而出若不修十地何有諸佛若無諸佛亦無法僧是故汝所説者則斷三寶種非是大人有智之言不可聽察菩薩有八法能集一切功德一者大悲二者堅心三者智慧四者方便五者不放逸六者勤精進七者常攝念八者善知識是故初發心者疾行八法如救頭然然後當修諸餘功德若聞佛語即能自解如丈夫能服苦藥小兒則以蜜和於曲人中行質直心敗壞人中行真正心諛諂人中行無諂心不知恩中行於知恩不知作中而行知作無利益中能行利益邪衆生中行於正行憍慢人中行無慢行不隨教中而不慍恚罪衆生中常作守護衆生所有過不見其失亦見律宗若人自度畏能度歸依者自未度疑悔何能度所歸若人自不善不能令人善若不自寂滅安能令人寂若能自安身在於善處者然後安餘人自同於所利若自成己利乃能利於彼自捨欲利他失利後憂悔空自發願不如説行欺誑衆生是名欺佛復次一切法中不如説行名為欺佛何等法失菩提心一不敬重法二有憍慢心三妄語無實四不敬知識更有餘法吝惜最要法貪樂於小乘謗毀諸菩薩輕賤坐禪者若於善知識其心懷結恨亦有諂曲心貪諸利養等不覺諸魔事菩提心劣弱業障及法障亦失菩提心許施師而誑其罪甚深重人無有疑悔強令生疑悔信樂大乘者深加重瞋恚訶罵説惡名處處廣流布於諸共事中心多有諂曲如此四黑法則失菩提心乃至失身命轉輪聖王位於此尚不應妄語行諂曲能令諸世間一切衆生類於諸菩薩衆而生恭敬心若有人能行如是之善法世世得增長無上菩提願若無有志幹好樂下劣法深著名利養其心不端直吝護於他家不信樂空法但貴諸言説是名敗壞相菩薩不得我亦不得衆生不分別説法亦不得菩提不以相見佛以此五功德得名大菩薩成阿惟越致菩薩未得至阿惟越致地應常勤精進猶如救頭然荷負於重擔為求菩提故常應勤精進不生懈怠心若求聲聞乘辟支佛乘者但為成己利常應勤精進何况於菩薩自度亦度彼於此二乘人億倍應精進東方善德佛南栴檀德佛西無量明佛北方相德佛東南無憂德西南寶施佛西北華德佛東北三乘行下方明德佛上方廣衆德如是諸世尊今現在十方若人疾欲至不退轉地者應以恭敬心執持稱名號阿彌陀等佛及諸大菩薩稱名一心念亦得不退轉説法者應行四法一者廣博多學能持一切言辭章句二者決定善知世間出世間諸法生滅相三者得禪定智慧於諸經法隨順無諍四者不增不損如所説行處師子座復有四法一者先應恭敬禮拜大衆然後升座二者衆有女人應觀不淨三者威儀視瞻有大人相敷演法音顏色和悅人皆信受不説外道經書心無吝畏四者於惡言問難當行忍辱復有四法一者於諸衆生生饒益想二者於諸衆生不生我想三者於諸文字不生法想四者願諸衆生從我聞法於無上菩提而不退轉復有四法一者善能安住陀羅尼門深信樂法二者善得般舟三昧勤行精進持戒清淨三者不樂一切生處不貪利養不求果報四者於三解脫心無有疑又能善起諸深三昧具足威儀憶念堅固有念安慧不調戲不輕躁不無羞不癡亂言無錯謬守護諸根不貪美味善攝手足所念不忘樂行頭陀分別世間出世間法心無疑悔言辭章句不可窮盡為諸聽者求安隱利不求他過有如是法應處師子座復有四法一不自輕身二不輕聽者三不輕所説四不為利養何等為四諦相一求一切善法故勤行精進二若聽受讀誦經法如所説行三厭離三界如殺人處常求勉出四為利益安樂一切衆生故自利其心諦名真實不誑得阿耨多羅三藐三菩提故名為不虛復有四法為三聖稱歎一乃至失命不為惡事二常行法施三受法常一其心四若生染心即能正觀染心起染因緣是染根者何名為染何者是染於何事起誰生是染如是正憶念知虛妄無實無有決定信解諸法空故無所有法故如是正觀染因緣故不起諸惡業餘一切煩惱亦如是觀若人有三十二妙法亦能發願是名真實菩薩一深心為一切衆生求諸安樂二能入諸佛智中三自審知堪任作佛不作佛四不憎惡他五道心堅固六不假偽結託親愛七乃至未入涅槃常為衆生作親友八親疏同心九已許善事心不退轉十於一切衆生不斷大慈十一於一切衆生不斷大悲十二常求正法心無疲懈十三勤發精進心無厭足十四多聞而解義十五常省己過十六不譏彼闕十七於一切見聞事中常修菩提心十八施不求報十九持戒不求一切生處二十於一切衆生忍辱無瞋礙二十一能勤精進修習一切善根二十二不隨無色定生二十三方便所攝智慧二十四四攝法所攝方便二十五持戒毀戒慈愍無二二十六一心聽法二十七一心阿蘭若處住二十八不樂世間種種雜事二十九不貪著小乘三十見大乘利益為大三十一遠離惡知識三十二親近善知識因捨心生廣快心作是念我若捨是衆鬧當得禪定因禪定生妙廣快法得是法已其後則能利益衆生勝今千萬倍是故為多利益衆生少時捨心權捨衆鬧當得禪定五神通等利益衆生菩薩何故作如是方便為得大心而作是念大人樂大利益故不存小利是故我今當求大人之法隨而修學應如是勤加精進為大利益所謂禪定神通滅苦解脫等佛地經論云菩薩不應於聲聞不生恭敬由是讚歎聲聞功德亦令其餘於聲聞衆生淨信故一切衆生無始時來習善時少造惡時多是故善法雖遇強緣亦難生長惡法雖遇少小外緣則便熾盛彌勒菩薩所問經論云菩薩有四種非善知識一者求聲聞人但欲自度二者求緣覺人喜樂小事三者讀外經典路伽耶等四者習學一切文辭嚴飾所有親近此四種者但增世利不增法利菩薩有四種真實功德一者能信解空亦信因果二者知一切法無有吾我而於衆生起大悲心三者深樂涅槃而遊生死四者所作施行皆為衆生不求果報若如是者即生在佛家大寶積經論云不以空故令諸法空但法性自空不以無相故令諸法無相但法自無相勝思惟梵天所問經論云外道之人依粗無智是故不識無我體相自他身中執著有我聲聞分知無我法相復有不知是故名為中無智暗始發心菩薩少分能知諸法無我復有不知有微無智離於有相取於無相大智度論云諸結使皆屬愛見屬愛煩惱覆心屬見煩惱覆慧如是離愛故屬愛結使亦離得心解脫如是無明離故屬見結使亦離得慧解脫捨除五陰名棄擔荷負佛法中自利利他二種功德名能擔諸外道輩自著於法若請若不請而自為人説佛於諸法不著不愛為憐愍衆生故有請説者佛便為説不以無請而初轉法輪若不以理求一切法則不可得若以理求之則無不得譬如鑽火以木則可得析薪求火火不可得非但言説名為法施常以淨心善心以教一切是名法施如佛所説利養瘡深譬如斷皮至肉斷肉至骨斷骨至髓人著利養則破持戒皮斷禪定肉破智慧骨失微妙善心髓若無精進則衆事不辦精進者無處不有既總衆法而別自有門譬如無明使遍在一切諸使中而別有不共無明問曰諸法實相無為無作精進有為有作相云何以實相為首答曰雖知諸法實相無為無作以本願大悲欲度衆生故於無作中以精進力度脫一切復次若諸法實相無為無作如涅槃相無一無二汝云何言實相與精進相異耶邪見人雖口説一切空然於愛處生愛瞋處生瞋慢處生慢癡處生癡自誑其身佛弟子實知空心不動一切結使生處不復生菩薩聞一切音聲語言分別本末觀其實相知音聲語言念念生滅音聲已滅而衆生憶念取相念是已滅之語作是念言是人罵我而生瞋恚稱讚亦如是是菩薩能如是觀衆生雖百千劫罵詈不生瞋心若百千劫稱讚亦不歡喜知音聲生滅如響相又如鼓聲無有作者是無住處畢竟空故但誑愚夫之耳是名入音聲陀羅尼菩薩能令一切法悉為佛法無有聲聞辟支佛法凡夫之法種種差別以無始空破無始見又不墮有始見譬如救人於火不應著深水中令破是無始亦不著有始中是則行於中道為破凡夫所知故名為聖智若無凡夫法則無聖法如無病則無藥是故經言離凡夫法更無聖法凡夫法性即是聖法有人著常顛倒故捨常相不著無常相是名法印非謂捨常著無常者以為法印我乃至寂滅亦如是地有色香味觸重故自無所作水少香故動作勝地火少香味故勢勝於水風少色香味故動作勝火心無四事故所為力大又以心多煩惱結使繫縛故令心力微少有漏善心雖無煩惱以取諸法相故其力亦少二乘無漏心雖不取相以智慧有量及出無漏道時六情隨俗分別取諸法相故不盡心力諸佛及大菩薩智慧無量無邊常處禪定於世間涅槃無所分別諸法實相其實不異但智有優劣得不可得者墮於斷滅不得不可得者是為慧方便不墮斷滅若無慧方便者取三事相若以三事空則取無相有慧方便者從本以來不見三事相是故不墮有無中佛以般若為母般舟三昧為父無常破常不應以無常為是苦樂我非我等亦如是空破慳而不破檀餘五法亦如是諸法畢竟空而亦不斷滅生死雖相續亦不是常無量阿僧祇劫業因緣雖過去亦能生果報而不滅是名微妙難知非但度衆生得成佛諸佛深法應當聽聞故不求名利供養恭敬不貪弟子不恃智慧亦不自高輕於餘人亦不譏刺但念十方諸佛慈心念衆生我亦如是學佛道説法無所依止適無所著但為衆生令知諸法實相如是清淨説法世世不失智慧光明乃至阿耨多羅三藐三菩提凡夫法虛誑不可得故非縛聖人法畢竟空不可得故非解諸煩惱不牽墮凡夫中故言不縛不以諸無漏法破煩惱故言不解行者以有為患用空破有心復貴空著於空者則墮斷滅初略後廣為解義故初廣後略為易持故離別常人易離別知識難離別知識易離別父子難離別父子易自離其身難自離其身易離其心者難貪除則五蓋盡去猶如破竹初節既破餘節皆去四正勤四如意足雖各各別位皆在四念處中慧多故名四念處精進多故名四正勤定多故名四如意足欲定精進定心定思惟定菩薩出家持戒説法能斷衆疑或時自恃而生憍慢應作是念我剃頭著染衣持鉢乞食此是破憍慢法云何於中生憍慢又此憍慢覆沒功德人所不愛惡聲流布後世常生弊惡畜生中若生人中卑鄙下賤以破憍慢故常生尊貴終不在下賤家生如雨墮不住山頂必歸下處若人憍心自高則法不入若人恭敬善師則功德歸之若有能開釋深義解散疑結於我有益則盡心敬之不念餘惡如弊囊盛寶不得以囊惡故不取其寶又如夜行嶮道弊人執炬不得以人惡故不取其照菩薩亦如是於師得智慧光明不計其惡復次菩薩作是念法師好惡非是我事我所求者惟欲聞法以自利益如泥像木像無實功德因發佛想故得無量福何况是人智慧方便能為人説以是故法師有過於我無咎若説聲聞辟支佛事猶為無益之言何况餘事亦見律宗菩薩深入實相然後悲念衆生譬如人有一子得好寶物深心愛念欲以與之凡夫人法虛誑無實雖復肉眼所見與畜生無異是不可信示人好醜善不善應行不應行生死為醜涅槃安隱為好分別三乘分別六度如是等名示教言汝捨惡行善是教未得善法味故心則退沒為説法引導令出汝莫於因時求果汝今雖勤苦果報出時大得利益令其心利故名利隨其所行而讚歎之令其心喜若樂布施者讚布施則喜故名喜以此四事莊嚴説法不破清淨住但破計我邪見取相心住譬如治田去其穢草是般若波羅蜜雖畢竟空而不墮斷滅雖分別有三乘亦不生著心於三事中不取定相是事甚深微妙般若波羅蜜無覺觀語言相而因此語言經卷能得此般若波羅蜜是故以名字經卷名為般若波羅蜜譬如毒蛇欲食蝦蟇常隨逐之蝦蟇到摩祇藥所蛇聞藥氣毒即消滅壞法惡人亦復如是欲壞行智度人常隨逐之以般若力故瞋恚邪見毒滅有降伏得道者有作弟子者有復道還去者若一心深信則供養經卷勝若不一心雖受持而不如若有行者一心求佛道折伏結使衣服淨潔所説法處清淨華香幡蓋香水灑地無處不淨是故諸天歡喜亦利益諸聽者有為善法是行處無為法是依止處餘無記不善法以捨離故不説此是新發心菩薩所學若得般若方便力應無生忍則不愛行法不憎捨法不離有為法而有無為法獨行讀誦正憶念雖難或以我心故功德小以經卷與他者有大悲心作佛道因緣無吾我故功德為大名字語言同而心義異如以著心取相説五陰等無常乃至無生無滅是相似般若若以不著心不取相説五陰無常但為破常顛倒故不著無常是真實般若新發意菩薩先教取相隨喜漸得方便力爾乃能行無相隨喜譬如鳥子羽翼未成不可逼令高翔六翮成就則能遠飛如人著木屐踐刺刺則摧折佛以禪定智慧屐摧五欲刺名滅假名相者如車屋林軍衆生諸法和合中便有是名無明力故取是假名相起諸煩惱業法相者五陰十二入十八界等肉眼觀故有慧眼觀故無是故法亦虛誑妄語應捨離離是二相餘但有無相相有人取是無相相還生結使是故亦不應取無相相若但行般若則心散亂不調順多生疑悔邪見失般若智慧相若與五波羅蜜合行則調順不錯能成辦衆事分別諸法大小有所得為失著不大不小等空相亦是失先世罪重今世不如所説行故不得般若力非般若過知色等法不可思議若住是不可思議中則不具足般若波羅蜜取不可思議相故若吝惜法則常生邊地無佛法處法師愛法著法求名聲故自恣樂説無有義理如逸馬難制又如大水暴漲衆穢渾雜是為魔事聞持陀羅尼能持能誦不能解義或得諸法實相陀羅尼義而不能次第讀誦師徒宜應和合一切惡事不應計念下者聞般若直信聽受不問義中者聞已問義而不能行上者聞解能行如小火能燒何况大者菩薩亦如是新學時能以般若轉世間法令畢竟空燒諸煩惱何况得力具足聞所説而信者不名為信智慧知已名為信但説無法所利少若説有法所利亦少今説有無二法具足故得無生忍譬如二輪具足故能有所至因緣生法無自性無自性故即是畢竟空是畢竟空從本以來空非佛所作亦非餘人所作諸佛為可度衆生故説是畢竟空相即是一切諸法實體不因內外有觀一切法空空亦空故不著空不妨憐愍衆生觀憐愍衆生亦不著衆生不取衆生相但引導入空故不妨空諸神天輕賤妄語人若菩薩不如所説行則五種執金剛神捨離不復守護惡鬼得便是人喜生惡心惡心故則生惡業惡業故則墮惡道語言能持義若失語言則義不可得當來世求三乘人聞佛説空無所有性以罪重智鈍故取空相便言凡夫惡人何以名垢出家得道人何以名淨是人不解佛語深義以何事而説著是空故言何用持戒等為即生邪見破正見破戒破威儀無所畏忌墮三惡道若不修道尚無少許攝心樂何况道果若心取相修道雖有攝心禪定樂無有道果若不取相著心修道則有道果諸佛以説法猛風吹卻顛倒雲翳令得清淨而諸法性常自無垢無淨是菩薩知一切法性空故能行一切種種道度衆生菩薩遠離憐愍衆生心但行般若求諸法實相或墮邪見中大乘莊嚴經論云八種過者一懈怠二不解義三拒請四不開義五不斷疑六斷疑不決定七心有厭退不一切時説故八有吝不盡開示故一切諸佛如是八過悉皆遠離是故得成無上説法方便心論云凡所言説但飾文辭無有義趣皆名為失又雖有義理而無次第亦名言失廣百論釋云要具三德名為法器一者稟性柔和無有偏黨恆自審察不貪己見二者常希勝解求法無厭不守己分而生喜足三者為性聰慧於善惡言能正了知得失差別若無如是所説三德雖有師資終無勝利又云劣慧者前不應輒説空無我理增其惡見謂初我執唯背涅槃後惡取空兼向惡趣大乘集菩薩學論云於如來教唯文字想而無入解皆名謗法禪法要解經云若能依義一切諸經皆是了義義畢竟空不可説相故若不依義是人於諸經皆不了義以無深智隨逐音聲故成實論云佛法貴如説行非但言説佛法應當自身作證不但隨他如佛語比丘汝等莫但信我語當自思惟是法可行是不可行三法度論云若能除淫怒癡是多聞餘者非多聞出曜經云所謂持法者不必多誦習若少有所聞具足法身行是謂持法人以法自將養雖多誦習義放逸不從正如牧數他牛不獲沙門果雖誦千章不義何益寧解一句聞可得道雖壽百年無慧不定不如一日黠慧有定南嶽思大師示衆云道源不遠性海非遙但向己求莫從他覓覓即不得得亦不真偈曰頓悟心源開寶藏隱顯靈通現真相獨行獨坐常巍巍百億化身無數量縱令逼塞滿虛空看時不見微塵相可笑物兮無比况口吐明珠光晃晃尋常見説不思議一語標名言下當又偈曰天不能蓋地不載無去無來無障礙無長無短無青黃不在中間及內外超羣出衆太虛玄指物傳心人不會續高僧傳云道障之起起乎心行道則無滯滯則障道焉有多聞能為道障有宋高僧傳云唐京兆大興善寺含光至西土有梵僧云曾聞台教定邪正曉偏圓明止觀功推第一再三囑光或因緣重至為翻唐為梵附來某願受持屢屢握手叮囑續傳燈録靈隱本禪師示看經僧偈曰看經不識經徒勞損眼睛欲得不損眼分明識取經法海觀瀾卷三禪觀要典楞伽阿跋多羅寶經四卷金剛般若波羅蜜經一卷大佛頂首楞嚴經十卷圓覺經一卷維摩經三卷華嚴合論四十卷摩訶止觀二十卷止觀輔行傳弘決四十卷宗鏡録一百卷景德傳燈録三十卷續傳燈録三十六卷傳法正宗記十卷宗門統要續集二十卷禪宗正脈二十卷頌古聯珠二十一卷六祖壇經一卷古尊宿語四十八卷萬善同歸六卷唯心訣一卷心賦注四卷明覺語録六卷佛果語録十七卷智證傳十卷石門文字禪三十卷大慧語録三十卷大慧書二卷正法眼藏三卷雪巖録高峰語録中峰語録三十卷天如語録真心直説一卷修心訣一卷決疑集一卷楚石語録紫柏集方便語壽昌語録
