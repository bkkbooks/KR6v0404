body:
  text: 古吳蕅益比丘智旭輯中山湯學紳康民閱梓淨土玄門大方廣佛華嚴經第十六卷云寧受地獄苦得聞諸佛名不受無量樂而不聞佛名所以於往昔無數劫受苦流轉生死中不聞佛名故又云若見如來者為得大善利聞佛名生信則是世間塔入法界品云若得見於佛除滅一切苦能入諸如來大智之境界若得見於佛捨離一切障長養無盡福成就菩提道大寶積經無邊莊嚴會云若復有人於日日中稱說如來名號功德是諸眾生能離黑暗漸次當得燒諸煩惱如是稱念南無佛者語業不空如是語業名執火炬能燒煩惱若復有人得聞如來及佛名號離諸黑暗與彼眾生為涅槃因菩薩見實會云此釋種決定得生安樂國面奉無量壽住安樂國已無畏成菩提能趣十方界供養無量佛安住一佛土能供十方佛授幻師跋陀羅記會云有四法得值諸佛一者恆以一心專念佛故二者稱讚如來諸功德故三者所受律儀遍清淨故四者以勝意樂發弘願故發勝志樂會云若有眾生發十種心隨一一心專念向於阿彌陀佛是人命終當得往生彼佛世界一者於諸眾生起於大慈無損害心二者於諸眾生起於大悲無逼惱心三者於佛正法不惜身命樂守護心四者於一切法發生勝忍無執著心五者不貪利養恭敬尊重淨意樂心六者求佛種智於一切時無忘失心七者於諸眾生尊重恭敬無下劣心八者不著世論於菩提分生決定心九者種諸善根無有雜染清淨之心十者於諸如來捨離諸相起隨念心淨信童女會云菩薩成就八種法故於諸佛前蓮花化生一者乃至失命不說他過二者勸化眾生令歸三寶三者安置一切於菩提心四者梵行無染五者造立佛像置蓮花座六者憂惱眾生令除憂惱七者於貢高人中常自謙下八者不惱他人文殊師利說般若會云法界一相繫緣法界是名一行三昧若善男子善女人欲入一行三昧當先聞般若波羅蜜如說修學然後能入一行三昧如法界緣不退不壞不思議無礙無相應處空閑捨諸亂意不取相貌繫心一佛念念相續即是念中能見過去未來現在諸佛何以故念一佛功德無量無邊亦與無量諸佛功德無二不思議佛法等無分別皆乘一如成最正覺悉具無量功德無量辨才如是入一行三昧者盡知恆沙諸佛法界無差別相大方等大集經第七云法語比丘二萬年中無有睡眠如彈指頃不生貪心瞋心癡心不善覺觀不念父母宗親眷屬飲食衣服房舍臥具資生之物亦不覺知晝夜之相二萬年中常修念佛大集日藏經第九云若種種善願不得稱心欲令如是種種惡業速滅盡者應淨洗浴著鮮潔衣菜食長齋勿噉辛臭於寂靜處莊嚴道場正念結加或行或坐念佛身相無使亂也更莫他緣念其餘事或一日夜或七日夜不作餘業至心念佛乃至見佛小念見小大念見大乃至無量念者見佛色身無量無邊彼佛身形三十二相於一一相亦念亦觀皆令明了隨所見相見青光明於彼光相專精繫意無令心亂作是念時而誦是咒哆絰咃毘視林婆毘視林婆鬱頭波䭾避耶毘視林婆斯那婆頗羅斯那婆頗羅阿㝹那多他恀阿㝹那多他恀復噓多俱致毘視林婆毘視林婆莎訶如是一相在於前心䯇䯇專念不起亂想然後誦此陀羅尼咒乃至念於佛身相中青色出光彼光出已從行者頂入爾時安心慎莫驚怖於自身中見於此光如彼青色念此青光於自身中各各支體處處徧行乃至一切身中火然見火然已乃至成灰及四方風來吹散滅如是念時見於自身無有一相唯有空在乃至十方皆悉是空不見一色如是念佛青色力緣誦持於咒成就此行善男子若復有人如是繫念不散亂心學四禪地依止心念陀羅而彼眾生一切業障煩惱障法障罪業皆盡唯除五逆破毀正法誹謗聖人菩薩念佛三昧經云正念諸法真如之相是名念佛大集念佛三昧經云當知如是念佛三昧則為總攝一切諸法大集賢護經云若有比丘比丘尼優婆塞優婆夷清淨持戒具足諸行獨處空閑如是思惟於一切處隨何方所即若西方阿彌陀如來是人爾時如所聞已端坐繫念專心想彼阿彌陀如來如是相好如是威儀如是大眾如是說法如聞繫念一心相續次第不亂或經一日或復一夜如是或至七日七夜如先所聞具足念故是人必覩阿彌陀如來應供等正覺也又云得見彼佛有三因緣一者緣此三昧二者彼佛加持三者自善根熟又云譬如有人持赤栴檀示愚癡人而彼癡故起臭穢想主人告曰若不信者應先嗅嘗為臭為香亦應觀察是檀光色文彩然彼愚者轉生憎惡以手捻鼻不肯嗅聞掩閉其目不肯觀視如是來世有惡比丘憎惡是經其事亦爾彼惡人輩不知修習身戒心慧愚癡無智猶如啞羊頑騃很弊彼諸惡人又薄福故雖復得聞如是妙典正念諸佛現前三昧不用書寫不能讀誦不能受持不能思惟不能為人宣揚廣說又亦不能廣生隨喜云何能得如說修行又云若有菩薩深樂廣宣復欲思惟如是三昧者當先護持清淨戒行不缺戒行不染戒行不汙戒行不濁戒行不著戒行不動戒行不被訶戒行智者所讚戒行聖所愛敬戒行應當念知如是諸戒也彼出家菩薩應當依彼波羅提木义成就威儀成就眾行乃至成就微塵數等戒行清淨活命於諸戒中當念成就應信甚深不得著忍於空無相無願諸法中聞說之時心不驚怖無有悔沒以是因緣成就清淨戒行乃至聖所愛敬戒行也若有出家菩薩取著色受持禁戒修行梵行如是取著受想行識受持禁戒修行梵行修行已作如是念我今如是持戒如是苦行如是修學如是梵行願我未來得生天上或生人間自在有生受諸果報以是因緣成就不清淨戒乃至聖者所不愛戒又云具足四法得是三昧一者不著一切外道語言二者不樂一切諸愛欲事三者常不遠離頭陀功德四者常厭三界諸有生處大樹緊那羅王所問經云菩薩成就四法不離見佛何等四自往見佛亦勸眾生自往聽法亦勸眾生自發菩提心亦勸眾生發菩提心常不捨離念佛三昧是為四觀佛三昧海經云一者持戒不犯二者不起邪見三者不生憍慢四者不恚不嫉五者勇猛精進如救頭然行此五事正念諸佛微妙色身令心不退亦當讀誦大乘經典以此功德念佛力故疾疾得見無量諸佛見諸佛者獨一心淨不與他共又云未來眾生其有得是念佛三昧者觀佛諸相好者得諸佛現前三昧者當教是人密身口意莫起邪命莫生貢高若起邪命及貢高法當知此人是增上慢破滅佛法是惡魔伴如是惡人雖復念佛失甘露味此人生處以貢高故身恆卑小生下賤家此邪命業壞敗善根猶如狂象壞蓮華池寶雨經云菩薩成就十種法生清淨佛剎一成就于戒無缺無雜無點汙二為一切有情心得平等三能成就廣大善根四於利養名稱恭敬讚歎心常捨離無所染著五得清淨信心無疑惑六常修精進離懈怠心七能入寂定無散亂心八能得多聞而無惡慧九成就利智非鈍根性十有慈悲性無損害心若有菩薩成就一法得無缺減無少違犯鮮白清淨即得具足成就十法諸法無行經云我未曾見聞慈悲而行惱互共相瞋恚願生阿彌陀若人如恆河惡口加刀杖如是皆能忍則生清淨土大乘入楞伽經云十方諸剎土眾生菩薩中所有法報佛化身及變化皆從無量壽極樂界中出又云大慧汝應知善逝涅槃後未來世當有持於我法者南天竺國中大名德比丘厥號為龍樹能破有無宗世間中顯我無上大乘法得初歡喜地往生安樂國月燈三昧經云是人臨欲命終時悲慧勇猛彌陀佛是佛為現住其前以持如是三昧故得見十力稱所求及諸聲聞住其前決定生彼安樂國以持如是三昧故如來智印經云若有書寫此法印讀誦宣示為人說此功德身不可議佛子當生極樂國十住斷結經神足品云西方去此無數佛土有佛名無量壽其土清淨無婬怒癡悉同一心皆由蓮花中生不因父母情欲生也純是童男亦無女形無大小便以禪悅樂法無想念識以為飯食共相敬念如父如母以生彼者可發誓願大乘莊嚴寶王經云觀自在菩薩變現種種救度無數百千萬俱胝那庾多有情令得往生極樂世界見無量壽如來得聞法要皆令當得成菩提道大般若經云是菩薩摩訶薩由與般若波羅蜜多恆相應故從此處沒生餘佛土從一佛國至一佛國在在生處常得值遇諸佛世尊供養恭敬尊重讚歎乃至無上正等菩提終不離佛又云若菩薩暫一覩見佛形像已乃至證得無上菩提終不捨於念佛作意又云是菩薩為聽法故常樂見佛若聞如來在餘世界現說正法即以願力往生彼界恭敬供養聽受正法又云是善男子善女人等信樂廣大能依妙色聲香味觸修廣大施修此施已復能種植廣大善根因此善根復能攝受廣大果報專為利樂一切有情於諸有情能捨一切內外所有彼迴如是所種善根願生他方諸佛國土現有如來宣說如是甚深般若無上法處彼聞如是般若法已復能安立彼佛土中無量有情令發無上正等覺心修菩薩行示現勸導讚勵慶喜令於無上正等菩提得不退轉由斯圓滿所發大願速證無上正等菩提又云若菩薩能正修行一相莊嚴三摩地者疾證無上正等菩提若善男子善女人欲入如是三摩地者應處空閑離諸喧雜結加趺坐不思眾相為欲利樂一切有情於一如來專心繫念審取名字善想容儀隨所在方端身正向相續繫念此一如來即為普觀三世諸佛所以者何一佛所有無量無邊功德辨才等一切佛三世諸佛乘一真如證大菩提無差別故若精勤修學得入如是一相莊嚴三摩地者普能了達無量無邊殑伽沙等諸佛法界無差別相亦能總持無量無數殑伽沙等諸佛菩薩已轉未轉無上法輪一一法門皆能了達甚深義趣宣說開示辨才無盡勝阿難陀多百千倍大智度論云莊嚴佛界事大獨行功德不能成故要須願力譬如牛力雖能挽車要須御者能有所至淨世界願亦復如是福德如牛願如御者念佛三昧能除種種煩惱及種種罪又有大福德能度眾生是諸菩薩欲度眾生諸餘三昧無如此念佛三昧福德能速滅諸罪者菩薩有所見色皆是佛色念佛三昧力故於色不著若遠離諸佛便壞諸善根沒在煩惱自不能度宏能度人如少湯投大冰池雖消少處反更成冰菩薩未入法位若遠離諸佛以少功德無方便力欲化眾生雖少益利反更墜落行生忍故一切眾生中發慈悲心滅無量劫罪得無量福德行法忍故破諸法無明得無量智慧二行和合故何願不得以是故菩薩世世常不離諸佛復次菩薩常愛樂念佛故捨身受身恆得值佛世人精進持戒者於念佛三昧心得定時罪垢不障即得見佛聞佛說法音聲清了若離有佛國者雖受人天樂不知是佛恩力所致與畜生無異若一切佛不出世則無三乘涅槃之道常閉在三界獄永無出期菩薩得無生法忍受記更無餘事唯行淨佛世界成就眾生見不淨世界相願我國土無如是事攝大乘論本云菩薩念佛法身由七種念應修此念一者諸佛於一切法得自在轉於一切世界得無礙通故二者如來其身常住真如無間解脫垢故三者如來最勝無罪一切煩惱及所知障並離繫故四者如來無有功用不作功用一切佛事無休息故五者如來受大富樂清淨佛土大富樂故六者如來離諸染汙生在世間一切世法不能染故七者如來能成大事示現等覺般涅槃等一切有情未成熟者能令成熟已成熟者令解脫故有宋高僧傳云唐法照問文殊言末法凡夫去聖時遙知識轉劣垢障尤深佛性無由顯現佛法浩瀚未審修行於何法門最為其要唯願大聖斷我疑網文殊報言汝今念佛今正是時諸修行門無過念佛供養三寶福慧雙修此之二門最為徑要所以者何我於過去劫中因觀佛故因念佛故因供養故今得一切種智是故一切諸法般若波羅蜜甚深禪定乃至諸佛皆從念佛而生故知念佛諸法之王汝當常念無上法王令無休息照又問當云何念文殊言此世界西有阿彌陀佛彼佛願力不可思議汝當繼念令無間斷命終之後決定往生永不退轉唐慧日至北印度健䭾羅國王城東北大山觀音像前七日叩頭斷食志誠祈請觀音空中現紫金色相長一丈餘坐寶蓮華垂右手摩日頂曰汝欲傳法自利利他西方淨土極樂世界彌陀佛國勸令念佛誦經廻願往生到彼國已見佛及我得大利益汝自當知淨土法門勝過諸行死心新禪師云清珠下於濁水濁水不得不清佛念投於亂心亂心不得不佛弟子等眾從無始來雖有善根皆墮偏小無非誤己誤人今得遇此書開正知見徧遊法海如得指南一方既正方方皆正初步不迷步步不迷所謂行步平正其疾如風可以直抵寶所得歸故鄉我佛必然遙伸右手慈悲攝受矣眾等一心上叩常住三寶懺悔屢生以來邪知邪見為利為名不知出要但增生死思之思之永斷貪瞋痴愛誓戒殺盜邪妄深信因果讀誦大乘莊嚴淨土早見彌陀速離濁惡成就慧身再迴娑婆普利塵沙同歸正覺惟愿彌陀世尊觀音勢至清淨海眾諸大菩薩冥中加被滿茲微願所有一沙一滴同歸法海一字一句化作光明燈燈無盡展轉無窮伏愿屢生父母歷劫恩冤早往蓮邦同為菩提眷屬是為至愿光緒二十三年六月十九日觀音聖誕之期圓滿板存揚州藏經禪院微塵室
