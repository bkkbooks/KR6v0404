front:
  text: 法海觀瀾序子輿氏有言曰觀水有術必觀其瀾況大藏法海甚深無量不得其術何以觀之哉夫統論修證法門浩若塵沙非止八萬四千而已然五門收之罄無不盡何者欲游佛海先資戒航戒淨則解行可遵行圓則祕密斯證證入則依果自嚴故首律宗明造修之始次諸教明開解之途次禪觀明實踐之行繼密宗明感應之微終淨土明自他同歸之地也中峰本公謂密咒如春教乘如夏南山律宗如秋禪宗如冬一往似當再研未必盡然尅論諸宗當究旨歸不當取其迹象禁咒祕密如冬令生意含於未發之中豈全似春戒為佛法初門儒不學禮無以立釋不受戒不許聽教參禪如春令草木萌甲安得如秋豈謂佛制毘尼有似蕭何制律遂擬以肅殺之氣耶可笑甚矣禪於無修無證中妙論修證無證而證則體含萬用可擬於冬無修而修則刊華就實正似秋耳教乘如夏吾無間然只此四門罔不以淨土為歸是故亦猶土之寄王於四時也夫大小兩乘皆首戒律而大必兼小小不兼大南山不敢自稱大乘不應以南山名宗但云律宗如春可矣教亦自有大小兩乘西土每每分弘此土晉魏以來或分或兼今皆廢小獨弘大乘復有三家一天台宗二賢首宗三慈恩宗天台教觀齊舉教可如夏觀即如秋賢首教多觀少清涼收禪為頓教圭峰自立三教以對三宗則三教如夏三宗如秋慈恩弘唯識教自修兜率觀門基公略示唯識五觀未嘗尅實勸修然夏後必定有秋是在學者自知領會而已故且云諸教如夏也禪亦自有大小兩門於大乘中復分頓漸小及大漸此所不論達摩承佛教盛行之後特來指示心要譬如畫龍點睛令其飛去乃至六祖無不皆然雖藉楞伽金剛印心未嘗廢教而貴行起解絕不許坐在知解窠臼故與台宗圓妙止觀同如秋也密宗唯是大乘法門身入壇場而結密印口誦密言意專密觀名三密法門若論初修之者必須先持淨戒發菩提心解法界理方許入壇尅期取證則亦由春夏而入於秋今約諸佛所說神咒不許翻譯唯令持者立地證入又令聞者乃至遇影蒙塵皆成究竟解脫種子故但云密宗如冬也淨土者三德祕藏常樂我淨究竟安隱之處所謂常即法身寂即解脫光即般若非一非三而三而一不縱不橫不並不別依正不二不可思議不二而二故全依即正名為佛身全正即依名為淨土耳秖此常寂光法性身土全體迷之而為三界六道偏證取之而為聲聞緣覺權位菩薩隨分悟之而為三賢十聖所以諸佛為實施權不動法性垂下三土為接三賢十聖示實報淨土為接聲聞緣覺權位菩薩示方便淨土為接三界六道凡夫示同居淨土而諸眾生根性不同樂欲亦異或因持三聚戒而淨四土或因習教解甚深義而淨四土或因禪觀直悟自心而淨四土或因專修三密傳持咒印而淨四土或唯以一門而淨四土或以二門三門四門而淨四土如世間草木華果或生長熟脫於春或生長熟脫於夏或生長熟脫於秋或生長熟脫於冬或唯經一時而即熟脫或經二時三時乃至具經四時而得熟脫故須云淨土如土寄王四時也夫八萬四千乃至塵沙法門未有不具戒者未有不正解者未有不篤行者未有不證密者未有不歸淨土者故曰五門收之罄無不盡也然則無解行之戒非戒也無戒行之教非教也無戒教之禪非禪也無戒解及禪之密非密也非戒非教非禪非密則非淨土真因也非有四種淨土則戒教禪密無實果也非真因實果則不顯非因非果之心性也不顯心性則無以觀法海之甚深無量而徹其涯底也故以五門之瀾為觀法海之術願與同志者共之甲午重九後一日北天目蕅益沙門釋智旭撰又序嘗觀諸佛菩薩智慧光明圓滿具足度盡古今大千世界原無一法可說此即達摩西來無一字之旨也乃大藏經論瀰天際地語言文字不可勝窮此義又何居乎我讀金剛經而知之矣金剛云無所住處生心諸佛菩薩即於無可說中立法也無法之法是名妙法學者不知萬法本於一法一法歸於無法每每撾宗堂之鼓登教者之臺持行門之鉢如一葦障狂瀾中飄忽滄溟莫知涯岸此所謂法海浮沈者也浮沈日久將諸佛語言文字浩瀚支離粘帶牽縛俾本源性命之書竟為煩惱沈淪之障可勝歎哉此蕅益大師續千聖之燈踞毘盧之頂出光明鏡轉法藏輪集從前教乘諸典選擇精要接引入門讀其綜舉之旨夫約以戒行為第一以證入繼之淨土終之至哉大師之言乎孔子曰四十而不惑子輿曰四十不動心此皆戒行圓明之後脚跟立定然後修證功夫次第可舉矣振裘者必挈其領汲水者必探其源法海觀瀾之意其在斯歟雖然大師序四淨土而以五門收之必全教戒禪密乃為真因實果故以五門之瀾為觀法之術夫嚴淨毘尼以為律巧立言說文字以為教因疑參究不墮知解窠曰以為禪持真言證入名曰密宗舉體淨緣名曰淨土其名雖殊其實則一又何得以吾師之律教而非即吾師之禪宗乎哉大師數十年之苦心綜輯貫通津梁學者獨標高唱選佛登科余服膺既久鋟而壽之願與現在來者精進奉持儻有學者衍流全部悟證無言迥出法門不拘文字見性明心立地成佛此又大師瀾中之瀾是即諸佛菩薩無法之法也余管窺釋教何敢妄肆廣長以滋語業但讀師之書仰師之教附贅一言以志不忘之意云爾甲辰年瀨水弟子湯學紳撰法海觀瀾卷第一目錄律宗要典佛說梵網經二卷菩薩瓔珞本業經二卷菩薩善戒經共十卷佛說受十善戒經一卷佛說十善業道經五紙文殊師利問經二卷佛藏經四卷優婆塞戒經七卷佛說文殊師利淨律經一卷清淨毘尼方廣經一卷菩薩藏經九紙佛說善恭敬經六紙佛說大乘戒經一紙華嚴二地品六紙半佛說決定毘尼經一卷佛說淨業障經一卷虛空藏菩薩經一卷觀虛空藏菩薩經二紙大集戒清淨平等章六紙大乘理趣淨戒波羅蜜多品一卷菩薩戒羯磨文五紙餘菩薩戒本經一卷菩薩五法懺悔經一紙半右大乘四分律藏六十卷摩訶僧祇律四十卷北作四十六卷彌沙塞五分律三十卷十誦律五十八卷十誦毘尼序三卷薩婆多毘尼毘婆沙八卷根本說一切有部毘奈耶五十卷根本說一切有部苾蒭尼毘奈耶二十卷根本說一切有部雜事四十卷根本說一切有部破僧事二十卷根本說一切有部尼陀那五卷目得迦五卷根本薩婆多部律攝十四卷善見毘婆沙律十八卷毘尼母經八卷舍利弗問經十三紙半佛說目連所問經二紙沙彌十戒法并威儀一卷佛說沙彌十戒儀則經三紙半沙彌尼戒經四紙佛說優婆塞五戒相經一卷戒消災經三紙佛說齋經三紙右小乘
