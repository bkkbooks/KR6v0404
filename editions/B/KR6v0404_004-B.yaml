body:
  text: 古吳蕅益比丘智旭輯中山湯學紳康民閱梓密咒圓因大寶積經無邊莊嚴會云若不了諸法自性不可得彼則行於相不得陀羅尼諸法如虛空由是說開示虛空及開示二俱無所有此二離於有諸法亦空無如是解法者彼能獲總持密跡金剛力士會云菩薩有十大法逮如是象無極大力何謂為十一曰寧棄身命勤受正法二曰未曾自大謙恪下意禮敬眾生三曰見於剛強難化眾生立之忍辱四曰見饑饉人以好美饍而充施之五曰覩諸恐懼勸慰安之六曰若有眾生得於重疾療以良藥七曰若有羸劣人所輕慢敬念戀之令無忽易者八曰以淨泥水塗如來廟補其虧缺九曰見孤苦人貧匱困厄常負重擔使去其難極重之殃十曰若有無護無所皈依常將濟之所語如言而不變失佛說一切如來真實攝大乘現證三昧大教王經云諸欲入曼拏羅者應先於普徧無餘諸有情界起救護心悉令獲得適悅快樂及得一切最上悉地又云若有不見大曼拏羅者汝不應為說此三昧法若有說者違越三昧以此三昧金剛摧碎汝頂又云諸餘未知此一印者汝當慎勿為其指示何以故是彼有情以不見大曼拏羅故輒結是印者不得成就彼即生疑反招殃咎速趣命終墮於無間大地獄中復墮惡趣又云汝不應以此祕密法輒為人說無令反招殃咎身壞命終墮大地獄佛說大悲空智金剛大教王儀軌經云於七日中施妙飲食起大悲心恭敬供養設惡來者倍生憐愍勿復於彼生下劣想令魔得便常勤悲念於晝夜分以慧決擇無復餘事無非時食不起邪思於他善惡勿樂宣傳觀察他身如護己有又云以智慧方便自性出生諸法及彼三世猶若虛空於剎那頃皆同一相離諸分別不為自他之所侵撓成就持明諸業用等設復於生死中而常清淨譬如河流亦如燈炷於晝夜中真實不斷彼無智者於是儀軌徒設疲勞此世他世無能成就又云以佛神力不思議故得成就已令諸眾生入佛知見若於眾生少分損害如是法印不能成就一字奇特佛頂經云持明者先當受三皈發菩提心清淨澡浴大悲愍念一切有情於寂靜處應結契印親承稟而受若異此結者諸魅及毗那夜迦而作障難死墮地獄不灌頂者不發菩提心者彼人前不應結此等印大乘瑜伽金剛性海曼殊室利千臂千鉢大教王經云壇場內供養食入道場人眾僧等并授法教主阿闍黎並不得取食其食與不入道場人食即得又云若有教主阿闍黎不在受法道場內與人妄說如來秘密三摩地觀秘教法藏者此人好求名利諂諛妄說得四重罪其聽者生生得盜法罪墮入地獄永不聞正教法若有受得如來秘密妙法則常應四時不闕供養行道念誦坐觀常行精進勿令懈怠又云魔作幻惑非關正智唯心示變莫取外緣須常諦觀心性見性最靜心性無物是相莫取則無境界妄相因緣陀羅尼集經云若善男子至心受持陀羅尼咒應當護持三業清淨護三業淨有二種護一外護二內護言外護者不得食我世尊殘食不得食一切聖賢殘食不得食一切鬼神殘食不得食師僧父母殘食不得食一切眾人殘食又不得食國王官人殘食不共眾人傳器而食亦不得食毗那夜迦鬼魔之食若麵裹物蒸煑燒熟歡喜團等皆不得食若食此食於三昧力不得成就若一切人畜生產處不得往到亦不得食諸死亡家十惡家酤酒家五辛家埋死人家賣凶具家不淨人家婬女家造經像家皆不得往亦不得食諸不淨人看他產人捉死屍人截割眾生身肉之人如是等人皆不得近與身相觸亦勿交往此名外護清淨之法內護清淨者身不得殺偷盜邪婬口不妄語惡口兩舌綺語戲論皆不應作意不應作貪瞋癡等唯起大慈大悲大喜大捨等心是名菩薩四無量心三業清淨由三業淨乃能受持此三昧陀羅尼佛頂咒印又云未入三曼荼羅大道場者不得為說此三昧陀羅尼咒印不得聽聞不得說法若為說者當墮地獄其聽法者得愚癡報輒見法者鬼神瞋訶雖自曾入三昧道場若不用心護法輕命露處作印咒法者為惡鬼神之所得便若能至誠堅固受持者一切諸天隨身為護又云其誦咒人應當具足堅持七法一者持戒二者忍辱三者離口四過四者於佛法中生決定信五者發無上菩提心六者常誦咒法心生慚愧七者於四威儀身心無倦猶如輪王具足七寶得紹王位王四天下咒師亦爾具前七法速得證驗又云壇內食分作三分一分送與寺內供養大眾一分施與貧窮乞兒一分布施水陸虛空諸眾生等諸入壇弟子及阿闍黎并主人等皆不合食如其食者法皆無驗大毘盧遮那成佛神變加持經云乃至身分舉動住止應知皆是密印舌相所轉眾多言說應知皆是真言又云燒除妄分別成淨菩提心此名內護摩為諸菩薩說蘇婆呼童子經云若有誦持一切真言法者先於諸佛深起敬心次發無上菩提之心為度眾生廣發大願遠離貪癡憍慢等業復於三寶深生珍重亦應虔誠遵崇大金剛部當須遠離殺盜邪婬妄言綺語惡口兩舌亦不飲酒及以食肉口雖念誦心意不善常行邪見以邪見故變為不善得雜染果持誦人先須持戒譬如芽種皆依地生由勤灌溉令芽生長世尊所說別解脫法清淨尸羅具應修行若是俗流唯除僧服自餘律儀悉皆無差一字佛頂輪王經云一切咒者心常寂靜堅持六念係修咒法發菩提心即得成就離菩提心畢無成辦金剛瑜伽中略出念誦經云不應與未入壇場人說此法事汝儻說者非但違失汝三摩耶自招殃咎耳應堅守正法設遭逼迫惱害乃至斷命不應捨離修菩提心於求法人不應慳吝於諸眾生有少不利益事亦不應作此是最上句義聖所行處廣大寶樓閣善住秘密陀羅尼經云勿以此法於後世時妄相付與下劣賤人惡性眾生破戒眾生懈怠眾生邪見眾生小乘眾生貪欲眾生我慢眾生如斯之類不須為說此陀羅尼牟梨曼陀羅咒經云若起貪欲心而誦咒乞效驗者當來成於夜叉種子若無智心中而誦咒求驗者當來成於鬼神種子若慈愍之心大慈悲心念佛之心如是心中誦咒乞驗當來成於如來種智所為所作得無障礙一切成就復次或欲睡眠嚬申欠呿謦咳洟唾整身形供具一切不安竊起緣慮即勿誦咒急當至心向佛瞻仰竭誠專注凝想正觀心意清淨乃可誦咒若大小遺已咒水一掬二十一遍想月臨照自灑頭頂周身及衣所有染污一切清淨妙臂菩薩所問經云其室開門唯得向東向西或向於北不得向南又云夏安居時不得作成就之法又云持誦行人求悉地者以持戒為根本然後運菩提心發精進勇施正勤力持誦真言常不懈退於佛菩薩倍生恭信譬如輪王具足七寶方理國土而得安靜金剛薩埵說頻那夜迦天成就儀軌經云是中成就法諸持明者欲作此法以慈悲為本利樂為先饒益有情方便攝化可作成就若用怨親之見取捨之情而作此法定不成就復招重罪有宋高僧傳云傳教令輪者東夏以金剛智為始祖不空為二祖慧朗為三祖法海觀瀾卷第五目錄淨土要典大寶積經無量壽如來會二卷佛說阿彌陀經四紙阿彌陀皷音聲王陀羅尼經三紙佛說觀無量壽佛經一卷無量壽經優波提舍七紙欠佛說阿彌陀經疏七紙觀無量壽佛經疏一卷觀無量壽佛經疏妙宗鈔六卷十疑論一卷往生淨土懺願儀十二紙決疑行願二門九紙淨土境觀要門六紙餘蓮宗寶鑑七卷念佛三昧寶王論淨土或問一卷寶王三昧念佛直指四卷楚石禪師西齋淨土詩二卷淨土生無生論一卷西方合論十卷樂邦文類六卷龍舒淨土文往生集三卷西方發願文
