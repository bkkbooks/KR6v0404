body:
  text: 古吳蕅益比丘智旭輯中山湯學紳康民閱梓律學綱維大方廣佛華嚴經賢首品云若常信奉於諸佛則能持戒修學處若常持戒修學處則能具足諸功德又云家是貪愛繫縛所欲使眾生悉免離故示出家得解脫於諸欲樂無所愛述曰出家學處所謂二百五十戒也戒名波羅提木叉此翻保解脫今既示出家得解脫是明指比丘戒法決能具足諸功德矣苟不持修豈名信佛奉佛誰謂毘尼僅屬小乘非即大華嚴哉明法品云於去來今佛所說之法所制之戒皆悉奉持心不捨離是故能令佛法僧種永不斷絕十行品中第二行云佛子何等為菩薩摩訶薩饒益行此菩薩護持淨戒於色聲香味觸心無所著亦為眾生如是宣說不求威勢不求種族不求富饒不求色相不求王位如是一切皆無所著但堅持淨戒作如是念我持淨戒必當捨離一切纏縛貪求熱惱諸難逼迫毀謗亂濁得佛所讚平等正法佛子菩薩如是持淨戒時於一日中假使無數百千億那由他諸大惡魔詣菩薩所一一各將無量無數百千億那由他天女皆於五欲善行方便端正姝麗傾惑人心執持種種珍玩之具欲來惑亂菩薩道意爾時菩薩作如是念此五欲者是障道法乃至障礙無上菩提是故不生一念欲想心淨如佛唯除方便教化眾生而不捨於一切智心佛子菩薩不以欲因緣故惱一眾生寧捨身命而終不作惱眾生事菩薩自得見佛已來未曾心生一念欲想何況從事若或從事無有是處爾時菩薩但作是念一切眾生於長夜中想念五欲趣向五欲貪著五欲其心決定躭染沈溺隨其流轉不得自在我今應當令此諸魔及諸天女一切眾生住無上戒住淨戒已於一切智心無退轉得阿耨多羅三藐三菩提乃至入於無餘涅槃何以故此是我等所應作業應隨諸佛如是修學作是學已離諸惡行計我無知以智入於一切佛法為眾生說令除顛倒然知不離眾生有顛倒不離顛倒有眾生不於顛倒內有眾生不於眾生內有顛倒亦非顛倒是眾生亦非眾生是顛倒顛倒非內法顛倒非外法眾生非內法眾生非外法一切諸法虛妄不實速起速滅無有堅固如夢如影如幻如化誑惑愚夫如是解者即能覺了一切諸行通達生死及與涅槃證佛菩提自得度令他得度自解脫令他解脫自調伏令他調伏自寂靜令他寂靜自安隱令他安隱自離垢令他離垢自清淨令他清淨自涅槃令他涅槃自快樂令他快樂佛子此菩薩復作是念我當隨順一切如來離一切世間行具一切諸佛法住無上平等處等觀眾生明達境界離諸過失斷諸分別捨諸執著善巧出離心恆安住無上無說無依無動無量無邊無盡無色甚深智慧佛子是名菩薩摩訶薩第二饒益行十地品中第二地專明戒波羅蜜第三十五卷隨好光明功德品云諸天子汝等應發阿耨多羅三藐三菩提心淨治其意住善威儀悔除一切業障煩惱障報障見障以盡法界眾生數等身以盡法界眾生數等頭以盡法界眾生數等舌以盡法界眾生數等善身業善語業善意業悔除所有諸障過惡離世間品云菩薩摩訶薩有十種清淨戒何等為十所謂身清淨戒護身三惡故語清淨戒離語四過故心清淨戒永離貪瞋邪見故不破一切學處清淨戒於一切人天中作尊主故守護菩提心清淨戒不樂小乘故守護如來所制清淨戒乃至微細罪生大怖畏故隱密護持清淨戒善拔犯戒眾生故不作一切惡清淨戒誓修一切善法故遠離一切有見清淨戒於戒無著故守護一切眾生清淨戒發起大悲故入不思議解脫境界普賢行願品十七卷大天告善財云如諸眾生及草木一切生長咸依地世及出世諸善根皆依最勝尸羅地無戒欲求生善道如鳥無翼欲飛空如人無足欲遊行亦如渡海無船筏或於日夕三時浴或復三時作護摩此云火祭謂結壇持咒術卻粒自默如啞羊無戒苦身無所利或大族子旃陀子俱能持戒等生天貴賤種姓虧戒身皆墮地獄無差別卑門持戒生天上勝族毀犯墮幽冥摩登持戒亦生天仙人破戒入諸獄王族多聞具色力惡見無戒如獸蚖如甘果樹猛獸圍猶蓮華池毒蛇止寧守貧賤恆持戒具聖財寶德嚴身破戒眾人之所輕持戒天人咸信重栴檀鬱金及沈麝如是一切不為香菩薩持戒最勝香徧出人天無有盡卑陋持戒後生天現蒙王者所瞻禮此世他生安隱樂如是戒果牟尼說欲生人天及涅槃如應具戒必當得是故精勤持淨戒隨心所願皆圓滿若有臨終肢節痛一切親屬欲分離諦思我有清淨戒身心歡樂無憂畏戒為惑病最勝藥護諸苦厄如父母癡闇燈炬生死橋無涯業海為船筏帝釋轉輪威德王富貴尊嚴無等倫家有僕隸能持戒承事供養而親敬若有臨至命終時持戒破戒生安畏欲得當來極樂處應當專意勤護持戒珠不假刀兵護戒為伏藏無所侵戒為勇伴導前行戒為出世莊嚴具我讚持戒諸功德如佛世尊真實說三十一卷天主光女告善財云汝應勤修表無表戒謂若性若遮有罪無罪微細觀察無缺減故三十三卷云有二種戒具足受持則得圓滿善知識法一菩薩戒二別解脫戒即比丘學處也持是二戒則能圓滿善知識法如佛所說自不持戒令他持戒無有是處若諸菩薩具足圓滿頭陀功德如是二戒悉得清淨不失善法三十八卷云菩薩有十種法審諦思惟具足圓滿則能成就無憍慢心一者諦觀身界作是念言我今出家無殊死人父母親愛朋友眷屬一切所有皆棄捨故二者思惟我今服壞色衣進止威儀不同世間三者思惟既毀形好執持應器乞丐於他四者思惟我今乞食如旃陀羅五者思惟為求段食長養我身我之壽命死在他手六者思惟所乞之食人畜之餘彼若嫌棄我方得食七者思惟我今應當於師長所恭敬供養令生歡喜八者思惟我今欲令同梵行者生歡喜故具足威儀無違法式九者思惟我今出家於佛法中未得少分十者思惟一切眾生於我瞋恨我常安隱如是思惟得無憍慢晉譯賢首品云戒是無上菩提本應當具足持淨戒若能具足持淨戒一切如來所讚歎十善業跡悉清淨勸化眾生持淨戒開發眾生求佛道因是得成清凉光十囘向品云菩薩若自不修梵行令他淨修梵行無有是處自退梵行令他具足梵行自破梵行令他安立梵行自離梵行令他立梵行道自減梵行令他修習梵行自不樂梵行令他樂修梵行自不住梵行令他安住梵行自不究竟梵行令他究竟梵行自捨梵行令他不捨安住梵行自壞散梵行令他攝取梵行俱無有是處何以故菩薩摩訶薩如說修行遠離顛倒又能廣說離顛倒法實語實行修習清淨身口意業離諸染汙行無礙處滅一切障離世間品云離慢下意心無放逸身口及意皆悉柔軟無有輕躁心常歡喜護持淨戒和顏愛語先意問訊遠離邪偽是菩薩智具自然成就佛法器故增益阿含經釋道安序云此二阿含其中往往有律語外國不通與沙彌白衣共視也而今已後幸共覆之使與律同此乃茲邦之急者也斯之誨幸勿藐藐聽也廣見而不知護禁乃是學士通中創也增益第二卷云所謂戒者息諸惡故戒能成道令人歡喜戒瓔珞身現眾好故夫禁戒者猶吉祥瓶所願便尅諸道品法皆由戒成如是行禁戒者成大果報諸善普具得甘露味至無為處第五卷云設有作重罪悔過更不犯此人應禁戒拔其罪根原長阿含經第十五卷婆羅門云戒即智慧智慧即戒有戒有智然後所言誠實無有虛妄我說名婆羅門佛言善哉善哉如汝所說有戒則有慧有慧則有戒戒能淨慧慧能淨戒如人洗手左右相須戒慧具者我說名比丘正法念處經云有垢戒者生於天中無垢戒者至於涅槃世間戒者則有流動出世間戒則無流動又云意受持戒故師則能與戒無心諂受戒必定入地獄又云自餘死者唯棄其身毀戒比丘一切善法皆悉破壞又云若受持戒者可得名為人一切破戒者則如狗不異中阿含經云人犯一法謂妄言是不畏後世無惡不作寧噉鐵丸其熱如火不以犯戒受世信施若畏於苦不愛念者於隱顯處莫作惡業若不善業已作今作終不得脫亦無避處又云若有比丘犯戒破戒缺戒穿戒穢戒黑戒者欲依戒立戒以戒為梯昇無上慧堂正法閣者終無是處雜阿含經云世尊告諸比丘當恭敬住常當繫心常當畏慎隨他自在諸修梵行上中下座所以者何若有比丘不恭敬住不繫心不畏慎不隨他自在諸修梵行上中下座而欲令威儀足者無有是處不備威儀欲令學法滿者無有是處學法不滿欲令戒身定身慧身解脫身解脫知見身具足者無有是處解脫知見不滿足欲令得無餘涅槃者無有是處本事經云出家而破戒二俱無所成謂失在家儀及壞沙門法寧吞熱鐵丸洋銅而灌口不受人信施而毀犯尸羅諸毀犯尸羅無悔無慚愧多受人信施定當生地獄諸有智慧人應堅持淨戒勿受人信施而毀犯尸羅大寶積經三律儀會云世若有人於別解脫起違背想則為於佛力無所畏而生違背彼若於佛力無所畏生違背者則於去來現在諸佛而生違背由此未來所受異熟無量大苦假使三千大千世界一切眾生受地獄苦比前眾生所受苦毒百分不及一乃至算數譬喻優波尼沙曇分亦不及一又云我終不聽執著我見眾生見壽者見補特伽羅見者於我法中而得出家我若不許強出家者皆為是賊食重信施亦不成就真比丘戒菩薩藏會云勿自恃持戒輕毀犯戒者恃戒陵於人是名真破戒又云譬如圂猪行處糞穢兼又食噉初無厭惡眾生亦爾極可憐愍婬惱所逼於親非親為諸煩惱之所加害行魔徒黨魔所縛纏裹惑網陷沒欲泥菩薩觀是事已於彼眾生發起大悲我當為彼宣說妙法令其永斷諸欲煩惱又云我說一切習近欲時無有少惡而不造者彼若報熟無有少苦而不攝受又云出家菩薩復有五法若成就者不值佛世不親善友不具無難失壞善根不隨安住律儀菩薩修學正法亦不速悟無上菩提何等為五一者毀犯尸羅二者誹謗正法三者貪著名利四者堅執我見五者能於他家多生慳嫉譬如餓狗慞惶緣路遇值鎖骨久無肉膩但見赤塗言是厚味便就銜之至多人處四衢道中以貪味故涎流骨上妄謂甜美或齩或䑛或齧或吮歡喜纏附初無捨離時有剎帝利婆羅門及諸長者皆大富貴來遊此路餓狗遙見心生熱惱作如是念彼來人者將無奪我所重美味便發大瞋出深毒聲惡眼邪視露現齒牙而行齧害如是當來末世有諸苾蒭於他施主勤習家慳耽味屎尿妄加纏裹雖值如是具足無難而便委棄不修正檢此之苾蒭我說其行如前癡狗又云當來之世我諸弟子少有苾蒭深心希樂趣般涅槃寂靜之法多依三事以為常業一者常喜追求世間名利二者貪樂朋黨追求食家往還不絕三者喜樂追求華飾房宇𫎓積財寶什物資具以依如是三種事故終不解脫三種惡趣文殊師利授記會云若有已發菩提心者乃至微惡終更不作何所不作謂貪瞋癡及以在家威儀調戲悉皆遠離若出家已不復希望名利恭敬安住出家所修行法又云菩薩成就一法令願不退嚴淨佛剎何謂一法應學不動如來為菩薩時本所修行立弘誓願我當所在生處初生之時若不出家則為欺誑十方諸佛如是菩薩應隨順學若佛出世若不出世一切生處皆悉決定捨家出家何以故菩薩最勝利益所謂出家樂出家者則能攝取十種功德一者不著諸欲二者樂阿蘭若三者行佛所行四者離凡夫行五者不著妻子及以財產六者離惡道因七者修善趣法八者宿世善根皆不損減九者恆為諸天之所歎羨十者一切鬼神恭敬守護又云菩薩成就三法令願不退攝受佛剎功德莊嚴一者尊重愛樂住阿蘭若二者無所染著而行法施三者堅固安住淨戒律儀菩薩堅住戒律得十無畏一者入聚落無畏二者眾中說法無畏三者飲食無畏四者出聚落無畏五者入寺無畏六者大眾中食無畏七者教授無畏八者親近和尚阿闍黎無畏九者於自眷屬慈心教誨無畏十者受用衣服飲食臥具醫藥無畏住戒律者所有言說令他信受又云若菩薩在家出家寧捨身命終不破戒以此持戒共諸眾生廻向無上菩提又云菩薩成就九法令願不退嚴淨佛剎一者具身律儀二者具語律儀三者具意律儀四者滅諸貪欲五者滅諸瞋恚六者滅諸愚癡七者不行欺誑八者為堅固友九者不輕慢善知識大神變會云大千界眾生皆發趣菩提假令盡一劫男女以奉施若人發道意以信而出家隨佛而修學其福勝於彼過去未來世一切諸如來無有不捨家得成無上道三世一切佛稱讚出家法若樂供養佛當依佛出家設滿恆沙界珍寶供養佛不如一日中出家修寂靜彼則近菩提摧破魔軍眾出家不放逸白法恆增長不壞眾善根遠離諸煩惱捨於家業累順道聖所讚捨家離惱縛除惱離魔縛心解行無染不久證菩提摩訶迦葉會云譬如二人善解醫方善解咒術善別毒藥善識甘露爾時一人於大眾中取毒食之現希有相食已受苦復求甘露咒術望除毒氣爾時彼人求不能得毒氣熾盛遂便命終時第二人作如是言我不能食毒藥不須甘露不欲處眾作希有想令生苦惱後五百歲有諸在家出家菩薩亦復如是作如是言如我說法能除諸罪轉集惡業言還懺悔彼於正法墮落退沒名為死人復有菩薩其心清淨既不作罪不須懺悔但當懺悔過去未來一切諸罪現在不作如彼不食毒藥不須甘露所言毒者於正法中犯於戒律又云寧可一日百數歸俗不應破戒受人信施又云寧以燒熱鐵鍱為衣不以破戒之身而著袈裟寧吞熱鐵不以破戒之身食人信施勝鬘夫人會云毘奈耶者即大乘學所以者何為佛出家而受具足是故大乘戒蘊是毘奈耶文殊師利所說不思議佛境界經云持戒具足八法而得清淨一者身行端直二者語業湻淨三者心無瑕垢四者志向堅貞五者正命自資六者頭陀知足七者離諸詐偽不實之相八者恆不忘失菩提之心大集經海慧菩薩品云客煩惱起生慚愧即向十方佛懺悔修集善法調諸根是故菩提心最勝又云不為我見受持淨戒能壞陰魔不為有貪受持淨戒壞煩惱魔若為遠離生死過失受持淨戒能壞死魔若能生心令毀禁者悉持淨戒受持淨戒則壞天魔又云發者離諸惡戒作者至心受持諸淨禁戒觀者至心調伏毀禁之人如法住者淨持禁戒不生憍慢無言菩薩品云若有受持清淨禁戒不求果報是名信力不生煩惱毀壞禁戒是名進力如是淨戒至心護持願向菩提是名念力觀身口意如水中月響幻燄等是名慧力不可說菩薩品云若有菩薩自作是言我是持戒彼是破戒如是菩薩名誑如來日密分護法品云若無量僧悉破禁戒但令五人清淨如法若有施者得福不可稱計何以故以有護持佛法者故憐愍一切諸眾生故其心平等無二相故破戒比丘雖在眾中受取信施不得安樂何以故破禁戒故不如法故如是人者一切十方無量諸佛所不護念雖名比丘不在僧數何以故入魔界故持禁戒者即佛弟子毀禁戒者即魔弟子我都不聽毀戒之人受人信施如葶藶子大乘本生心地觀經云若有不受如來戒尚不能得野干身何況能感人天中最勝快樂居王位又云出家菩薩以三觀門修忍辱行名真出家觀諸眾生是佛化身觀於自身為實愚夫觀諸有情作尊貴想觀於自身為僮僕想又觀眾生作父母想觀自己身如男女想出家菩薩常作是觀或被打罵終不加報善巧方便調伏其心寶雨經云菩薩見違犯中如微塵量深生怖畏下至小罪心懷大懼况多違犯而生隨喜何以故由如來說苾蒭當知多服毒藥能令人死少服毒藥亦令人死苾蒭當知若多犯罪即生惡趣若少犯罪亦生惡趣菩薩如是正思惟時驚怖違犯又云菩薩成就十種法能持毘奈耶藏一能了知毘奈耶二能了知毘奈耶義三能了知毘奈耶甚深理趣四能了知毘奈耶微細五能了知應作不應作六能了知自性違犯七能了知施設違犯八能了知所學波羅提木叉緣起九能了知聲聞毘奈耶十能了知菩薩毘奈耶諸法無行經云以無持戒性是知持戒法如是知戒相終不毀於戒大薩遮經云一切功德助道之行舉要言之以戒為本持戒為始若不持戒乃至不得疥癩野干身何况當得功德之身以戒淨故不斷佛種成等正覺不斷法種分別法性不斷僧種修無為道以持淨戒相續不斷故功德無盡思益梵天經云問曰世尊誰能親近於佛佛言乃至失命因緣不毀禁者月燈三昧經云無物能將此定來必由淨戒之所起又云俗人處居家善護持五戒况得出家已棄捨一切禁戒不完具者棄捨我道教毀謗於正法阿鼻獄為家又云菩薩淨戒有十種利益一為滿足一切智二如佛所學而學三智者不毀四不退誓願五安住於行六棄捨生死七慕樂涅槃八得無纏心九得勝三昧十不乏信財又云常行乞食有十種利一摧我慢幢二不求親愛三不為名聞四住在聖種五不諂不誑不現異相又不慠慢六不自高舉七不毀他人八斷除愛恚九若入人家不為飲食而行法施十住頭陀行有所說法為人信受又云不以無身手故名闕身分若不持戒者是名身分缺師子月佛本生經云戒為甘露藥服者不老死戒德可恃怙福報常隨己持戒得安隱生處無患難亦當見諸佛受法得解脫法集經云菩薩修持淨戒不破不漏不點不污智者讚歎住彼如是持淨戒中所作大願皆悉成就又云世間出世間一切勝妙果報皆由持戒而得依因淨戒根本力故譬如一切草木叢林依地為根本菩薩住於持戒能與一切天人作大福田復能滿足施者功德復次菩薩出家修持淨戒則能遠離一切世務之事著於染衣則能滿足捨一切所愛之物受持淨戒則能滿足身口意清淨愛念持戒則能滿足六通宴坐持戒則能滿足菩提分法聞於妙法修持淨戒則能滿足四無礙智推求多聞智慧修持淨戒則能滿足不自高心親近善知識修持淨戒則能滿足一切功德修持施波羅蜜戒則能滿足一切智智如所聞法如說修持淨戒則能滿足為大法師如所聞法思惟持戒則能滿足得陀羅尼念菩提心修持淨戒則能超過一切諸惡得滿足戒不生害心修持淨戒則能滿足不失菩提心不失菩提心修持淨戒則能滿足不失三寶心若有能護修持戒者世間所有可護之者皆悉能護是名菩薩念戒菩薩處胎經云夫人欲出家禁戒以為首不著飾好法行權菩薩道畢命不惜身不犯如毫釐又云八關齋者諸佛父母央掘摩羅經云沙門法者不多積聚乃至鹽油亦不受畜是沙門法奴婢田宅若賣若買諸不淨物非沙門法是在家法商主天子所問經云若自有犯而不覆藏如是菩薩當得直心若見破戒乃至為命不捨菩提心如是菩薩得名持戒大迦葉問經云有二種法增出家熱惱一受持袈裟心懷不淨二恃己戒德呵責非行大般若經第四云若染色欲於生梵天尚能為障况得無上正等菩提是故菩薩斷欲出家修梵行者能得無上正等菩提非不斷者又云菩薩於五欲中深生厭患不為五欲過失所染以無量門訶毀諸欲欲為熾火燒身心故欲為穢惡染自他故欲為魁膾於去來今常為害故欲為怨敵長夜伺求作衰損故欲如草炬欲如苦果欲如利劒欲如火聚欲如毒器欲如幻惑欲如闇井欲如詐親旃荼羅等舍利子諸菩薩摩訶薩以如是等無量過門訶毀諸欲既善了知諸欲過失寧有真實受諸欲事但為饒益所化有情方便善巧示受諸欲第八云菩薩修行般若波羅蜜多應學清淨身語意業又云從初發心常樂受持十善業道不起聲聞心不起獨覺心於諸有情恆起悲心欲拔其苦恆起慈心欲與其樂第四十七云若菩薩生如是心我應從初發心乃至證得無上菩提於其中間誓當不起貪欲心瞋恚心愚癡心忿心恨心覆心惱心誑心諂心嫉心慳心憍心害心見慢等心亦復不起趣向聲聞獨覺地心如是名為菩薩殊勝廣大心第五十一云發應一切智智心大悲為上首以無所得而為方便自住十善業道亦勸他住十善業道持此善根與一切有情同共迴向阿耨多羅三藐三菩提是為菩薩淨戒波羅蜜多第五十四云菩薩作是思惟此十惡法尚礙善趣二乘聖道况大菩提故應遠離又云於所學戒堅守不移而於其中能不取相是為菩薩於諸學處未曾棄捨第七十五云若菩薩雖受持戒而有所依謂作是念我為饒益一切有情受持淨戒我隨佛教於淨尸羅能無所犯我行淨戒波羅蜜多彼持戒時以有所得而為方便與諸有情同共迴向阿耨多羅三藐三菩提復作是念我持此福施諸有情令得此世他世安樂乃至證得無餘涅槃彼著三輪而受持戒一者自想二者他想三者戒想由著此三輪受持戒故名世間淨戒波羅蜜多何緣此戒名為世間以與世間同共行故不超動出世間法故若菩薩受持戒時三輪清淨一者不執我能持戒二者不執所護有情三者不著戒及戒果是為菩薩摩訶薩受持戒時三輪清淨又舍利子菩薩以大悲為上首所持戒福普施有情於諸有情都無所得雖與一切有情同共迴向阿耨多羅三藐三菩提而於其中不見少相由都無所執而受持戒故名出世間淨戒波羅蜜多何緣此淨戒名出世間不與世間同共行故能超動出世間法故第一百一云若諸有情長夜破戒是菩薩於內外法一切悉捨方便令彼安住淨戒波羅蜜多第一百二云我若不護淨戒波羅蜜多當生諸惡趣尚不能得下賤人身何由成熟有情嚴淨佛土况當能得一切智智第三百二十五云若不退轉位菩薩於佛善說毘奈耶中深生信解終無疑惑無戒禁取不墮惡見不執世俗諸吉祥事以為清淨終不禮敬諸餘天神如諸世間外道所事三百二十六云不退轉位菩薩不重利養不狥名譽於諸飲食衣服臥具房舍資財皆不貪染雖受十二杜多功德而於其中都無所恃三百二十七云是菩薩雖現處居家而常修梵行終不受用諸妙欲境雖現攝受種種珍財而於其中不起染著又於攝受諸欲樂具及珍財時終不逼迫諸有情類令生憂苦三百七十三云云何菩薩修戒隨念是菩薩修行般若波羅蜜多時從初發心乃至安坐妙菩提座恆住淨戒無缺無隙無瑕無穢無所取著應受供養智者所讚妙善受持妙善究竟隨順勝定思惟此戒以無性為自性由是因緣不應思惟何以故如是淨戒都無自性若法無自性則無所有若無所有則不可念所以者何若無念無思惟是為戒隨念善現白佛若一切法皆以無性為自性者則應無色亦無受想行識廣說乃至一切法皆應是無佛言於汝意云何於一切法皆以無性為自性中有性無性為可得不善現答言不也世尊不也善逝於一切法皆以無性為自性中有性無性俱不可得佛言若爾云何汝今可為是問若一切法皆以無性為自性者則應無色廣說乃至一切法皆應是無時善現白佛言世尊我於是法無惑無疑然當來世有苾蒭等求三乘者彼作是說佛說一切法皆以無性為其自性若一切法皆以無性為自性者誰染誰淨誰縛誰解彼於染淨及於縛解不了知故破戒破見破威儀破淨命由破戒見威儀淨命當墮地獄傍生鬼界受諸劇苦輪迴生死難得解脫我觀未來當有如是可怖畏事故問如來如是深義然我於此無惑無疑佛言善哉善哉如是如是如汝所說於一切法皆以無性為自性中有性無性俱不可得不應於此執有無性第三百四十九云不應容納破戒之心經剎那頃况經多時第四百四云菩薩修行般若波羅蜜多於身語意三有罪業無容暫起若作是念此是身我由此故而起身業此是語我由此故而起語業此是意我由此故而起意業是名有罪身語意業若得身語意及身語意業者便起慳貪心犯戒心忿恚心懈怠心散亂心惡慧心若從初發心恆具受持十善業道不起聲聞及獨覺心常於有情起大悲心是亦名為能淨身語意三種麄重四百十六云十種不善業道尚當能礙人天善趣况於聖道及大菩提而不為障四百四十八云一切不退轉菩薩常樂受行十善業道自離害生命亦勸他離害生命恆正稱揚離害生命法歡喜讚歎離害生命者乃至自離邪見亦勸他離邪見恆正稱揚離邪見法歡喜讚歎離邪見者是菩薩乃至夢中亦不現起十惡業道况在覺時四百九十云菩薩志性好遊諸佛國土隨所生處常樂出家剃除鬚髮執持應器披三法服現作沙門五百五十二云若菩薩如是學時所生之處離害生命離不與取離欲邪行離虛誑語離麄惡語離離間語離穢惡語亦離貪欲瞋恚邪見終不攝受虛妄邪法不以邪法而自活命亦不攝受破戒惡見謗法有情以為親友五百六十六云雖知諸法離而深畏眾罪如佛所說應持淨戒修諸福業乃至般若波羅蜜多於少罪中應懷大懼不與同止以世尊說譬如毒藥多少俱害五百六十八云是諸菩薩又復常離一切惡業終不毀犯佛所說戒心無嫉妬身語無失又云乃至夢中不近惡友况於覺時而親近彼所以者何諸菩薩於破戒人著邪見人不律儀人行邪命人無義語人住懶惰人樂生死人背菩提人愛俗務人雖常憐愍而不共住又云念佛世尊所說禁戒謂作是念三世諸佛皆學此戒成無上覺證大涅槃如是知已精勤修學天王當知諸菩薩行深般若波羅蜜多為化有情及自修習少欲喜足著糞掃衣心常清潔信力堅固寧失身命於戒不犯心離憍慢遊行城邑雖服弊衣而不生恥遠離懈怠常修精進所作未辦終不中止於糞掃衣不見過患朽故弊壞終無輕鄙但取其德夫離欲者乃服此衣如來所讚失慳貪者亦不自讚我能服此於他不服終無毀言又云諸菩薩行深般若波羅蜜多善知種種毘奈耶法謂毘奈耶毘奈耶行毘奈耶甚深毘奈耶微細淨與不淨有失無失別解脫本聲聞毘奈耶菩薩毘奈耶是謂諸菩薩行深般若波羅蜜多於如是等毘奈耶法皆悉善知善知一切威儀戒行善學聲聞獨覺菩薩所受持戒既修戒行若見威儀不稱眾意則應捨離非處不行若有沙門威儀戒行具足清白即親近之若婆羅門異學餘行則勸捨離修毘奈耶修習如是戒行成滿心無巧偽嫉妒便滅五百六十九云持戒清淨無穿缺雜戒品清淨過諸聲聞及獨覺等五百八十三云若諸有情修諸善法心無厭倦受持淨戒終不毀犯常樂利益一切有情雖遇苦緣而無怯弱隨所修學願與有情同證菩提畢竟安樂是為菩薩摩訶薩相具此相者名為菩薩放光般若經云菩薩行般若波羅蜜亦不見身口意雖有身口意終不嫉恚邪見不兩舌惡口妄言綺語無殺盜婬無懈怠意初不起惡智之事若有菩薩不能捨此諸惡事者此非菩薩佛母出生三法藏般若經云乃至夢中亦行十善而不暫起十不善行是為不退轉菩薩法華經云若見佛子持戒清淨如淨明珠求大乘經如是之人乃可為說大般涅槃經云受持是經而毀戒者則是眾生惡知識也非我弟子是魔眷屬如是之人我亦不聽受持是典寧使不受不持不修不以毀戒受持修習若我弟子受持讀誦書寫演說涅槃經者當正身心慎無掉戲輕躁舉動又云菩薩摩訶薩常不犯惡設有過失即時懺悔於師同學終不覆藏慚愧自責不敢復作於輕罪中作極重想又云為利養故受持禁戒當知是戒不見佛性及以如來雖聞佛性及如來名猶不得名為聞見也若為正法受持禁戒當知是戒能見佛性及以如來十住毘婆沙論云持戒與七法和合故為善行一慚二愧三多聞四精進五念六慧七淨命淨身口業行此七法具持諸戒是名善行諸行於曲人中行質直心敗壞人中行真正心諛諂人中行無諂心不知恩中行於知恩不知作中而行知作無利益中能行利益邪眾生中行於正行憍慢人中行無慢行不隨教中而不慍恚罪眾生中常作守護眾生所有過不見其失若受佛戒不能護持則欺諸佛是汙佛家何以故受戒時生佛家中破戒則欺諸佛名汙佛家二虛空繫法者一貪著應路伽耶等經二嚴飾衣鉢二縛者一著諸見縛二貪利縛二障法者一親近白衣二疎遠善人二垢法者一忍受諸煩惱二樂諸檀越知識二瘡法者一見他人過二自藏其過二坑法者一毀壞正法二破戒受供二燒法者一以穢濁心而著袈裟二受淨戒者供給彌勒菩薩所問經論云言大施者謂受持五戒此是如來所說大施以能攝取無量眾生故成就無量眾生樂故修多羅中說持戒人所願所作皆悉成就何以故戒清淨故色貪不淨能斷婬貪捨心能斷勝思惟梵天所問經論云諸菩薩等以何義故名法王子以初發心來常斷婬欲法故大智度論云比丘尼得無量律儀故應次比丘後在沙彌前佛以儀法不便故在沙彌後是菩薩必在四眾中有四眾不在菩薩中罪福從惱他益他生非自供養身自殺身故有罪有福以是故毘尼中言自殺身無殺罪有愚癡貪欲瞋恚之咎好行善道不自放逸是名尸羅或受戒行善或不受戒行善皆名尸羅持戒之人無事不得破戒之人一切皆失諸餘罪中殺罪最重諸功德中不殺第一五種優婆塞一分行者於五戒中受一戒不能受持四戒少分行者若受二戒若受三戒多分行者受四戒滿行者盡受五戒斷婬者受五戒已師前更作誓言我於自婦不復行婬三歸依竟我某甲若身業不善若口業不善若意業不善貪欲瞋恚愚癡故若今世若先世有如是罪今日誠心懺悔身清淨口清淨心清淨受行八戒是則布薩秦言善宿問曰何故六齋日受八戒修福德荅曰是日惡鬼逐人欲奪人命疾病凶衰令人不吉是故劫初聖人教人持齋修善作福以避凶衰是時齋法不受八戒直以一日不食為齋後佛出世教語之言汝當一日一夜如諸佛持八戒過中不食是功德將人至涅槃白衣來欲求出家應求二師一和尚一阿闍黎和尚如父阿闍黎如母若持戒無忍當墮地獄雖不破戒以無忍故不免惡道何可縱忿不自制心惟當忍辱眾戒自得如人著色觀身不淨三十六種則生厭心若於觸中生著雖知不淨貪其細軟觀無所益是故難離以其難離故為之常作重罪若隨地獄地獄有二部一名寒冰二名炎火此二獄中皆以身觸受罪苦毒萬端此觸名為大黑暗處危難之險道也從初發心修戒增積無量與憐愍心俱不求果報不向聲聞辟支佛道不離諸結使但為自心清淨不惱眾生故世世持戒以是故得佛道時戒得具足眾僧大海中結界為畔際若有破戒者終不在僧數譬如大海水不共死尸宿佛如醫王法如良藥僧如瞻病人戒如服藥禁忌佛於無量阿僧祇劫來持戒清淨故身口業無失餘諸阿羅漢如舍利弗等極多六十劫不久習戒故有失出家菩薩守護戒故不畜財物又自思惟戒之功德勝於布施以是因緣但隨所有而施菩薩亦不一定常少物布施隨所有多則多施少則少施菩薩常斷婬欲乃至不生想念况有實事若破戒者惱亂一切是故菩薩不生破戒心何况破戒有一鬼頭似猪臭蟲從口出身有金色光明是鬼宿世作比丘惡口罵詈客比丘以身持淨戒故身有光明以口有惡言故臭蟲從口出於五欲中觸為第一能繫人心如人墮在深泥難可拯濟若受餘欲猶不失智慧婬欲會時身心荒迷無所省覺深著自沒是故諸天令菩薩離之菩薩輕餘菩薩念念一劫遠於佛道經爾所劫更修佛道以是故不應自高亦不下他持戒雖能不墮惡道中生人中貧窮不能自利又不益人以是故行布施問曰尸波羅蜜則總一切戒法譬如大海總攝眾流所謂不飲酒不過中食不杖加眾生等是事十善中不攝何以但說十善荅曰十善為總相戒別相有無量戒不飲酒不過中食入不貪中杖不加眾生等入不瞋中餘道隨義相從如發心欲殺作方便惡口鞭打繫縛斫刺乃至垂死皆屬於初死後剝皮食噉割截歡喜皆名後奪命是本體此三事和合總名殺不善道故知說十善道則攝一切戒為今世取涅槃故婬欲雖不惱眾生心繫縛故為大罪以是故戒律婬欲為初白衣戒不殺在前為求福德故戒律中戒雖復細微懺則清淨犯十善戒雖復懺悔三惡道罪不除如比丘殺畜生雖復得悔罪報猶不除故但說十善業道亦自行亦教他人名為尸波羅蜜十善道七事是戒三為守護故通名為尸波羅蜜問曰口業有四種何以但說實語荅曰佛法中貴實故說實餘皆攝四諦實故得涅槃復次菩薩與眾生共事惡口綺語兩舌或時能有妄語罪重故初地應捨持戒則攝一切眾生布施則不能普周一切持戒遍滿無量如不殺生戒則施一切眾生命如眾生無量無邊福德亦無量無邊略說諸能破佛道事此中皆名破戒離是破戒垢皆名清淨乃至聲聞辟支佛心尚是戒垢何况餘惡菩薩知諸法實相故尚不見持戒何况破戒行者以妨道故出家若復習近白衣則與本無異以是故先求自度然後度人若未能自度而欲度人者如不知浮人欲救於溺相與俱沒若說聲聞辟支佛事猶為無益之言何况餘事十二頭陀不名為戒能行則戒莊嚴不能行不犯戒譬如布施能行則得福不能行者無罪佛所結戒弟子受持不能行則有罪矣惡人破戒者有可化有不可化不可化者若攝取共住則自壞其道於彼無益譬如救溺自不能濟而欲濟彼二俱不免菩薩住尸羅或未得無生法忍故諸煩惱風吹動願樹欲壞其尸羅爾時應求禪定樂除却五欲樂五欲樂除故戒得清淨下人破戒中人著戒上人不著戒菩薩思惟若我憎破戒及破戒者愛戒及持戒者而生愛恚則還受罪業因緣破五眾戒名為破戒不破所受戒常為三毒覆心不憶念戒迴向天福邪見持戒如是等名戒不淨自誓而犯是一罪知佛所制而故違犯是二罪初發心菩薩雖起諸煩惱終不染心作惡雖加杖楚終不奪命不取他財令其失命瑜伽師地論云能建立義能任持義是根本義由此尸羅建立任持一切世間及出世間能引無罪最勝第一快樂功德令生令證是故尸羅說名根本譬如大地建立任持一切藥草卉木叢林令生令長戒莊嚴具於一切類於一切時若有服者皆為妙好由此所受清淨無罪妙善尸羅能正除遣一切所受惡戒為因身心熱惱譬如最極炎熾熱時塗以栴檀龍腦香等一切鬱蒸皆得除滅是故尸羅說名塗香具戒士夫補特伽羅遍諸方域妙善稱譽聲頌普聞譬如種種根熏香等隨風飄颺遍諸方所悅意芬馥周流彌遠是故尸羅名為熏香由此尸羅清淨善行能趣妙樂往妙天趣向妙安隱故名妙行由此尸羅清淨善法是防護性是息除相是遠離體故名律儀問何故不許扇搋迦半擇迦出家及受具足戒耶荅由此二種若置苾蒭眾中便參女過若置苾蒭尼眾中因摩觸等便參男過由不應與二眾共居是故不許出家問何故此二雖受歸依亦能隨受諸近事男所有學處而不得名近事男耶荅近事男者名能親近承事苾蒭苾蒭尼眾彼雖能護所受律儀而不應數親近承事二眾二眾亦復不應親近攝受彼類是故彼類不得名近事男然其守護所有學處當知福德等無差別三具足經優波提舍云律儀戒者菩薩正取七種律儀所謂比丘比丘尼式叉摩那沙彌沙彌尼優婆塞優婆夷戒出家在家如是次第皆律儀攝大乘莊嚴經論云毘尼有二種四義初四義者一罪二起三淨四出罪者罪自性謂五聚罪起者罪緣起此有四種一無知二放逸三煩惱疾利四無恭敬心淨者罪還淨由善心不由治罰出者罪出離此有七種一悔過謂永遮相續二順教謂與學羯磨治罰三開許謂先時已制後時更開四更捨謂僧和合與學者捨是時先犯還得清淨五轉依謂比丘比丘尼男女轉根出不共罪六實觀謂法優陀那由勝觀察七性得謂見諦時細罪無體由證法空法爾所得復四義者一人二制三解四判人者謂犯罪人制者謂依彼犯人大師集眾說彼過失制立學足解者謂如所制更廣分別判者謂云何得罪云何不得罪如是應持眾經撰雜譬喻上云持戒之人無事不得破戒之人一切皆失大毗婆沙論云何故名為聖所愛戒荅是諸功德所依處故謂諸聖者愛樂功德故愛此戒如人愛寶亦愛寶器如是聖者愛樂清淨菩提分法功德寶故亦愛如是所依戒器復次聖者憎惡諸破戒惡戒能對治破戒惡故聖者愛之復次聖者憎惡諸嶮惡趣戒能超越嶮惡趣故聖者愛之復次聖者憎惡生死流轉戒能超越生死流轉故聖者愛之復次聖者愛涅槃戒能趣涅槃故聖者愛之分別功德論云毘尼者禁律也為二部僧說檢惡斂非引法防姦猶王者祕藏非外官所司故曰內藏也諸藏之中律藏最在其內不可示沙彌及以白衣解脫道論云如人無頭一切諸根不復取塵是時名死如是比丘以戒為頭若頭斷已失諸善法於此佛法謂之為死是戒為頭義出曜經云人之修道唯有信戒信根已全戒則不毀佛所行讚經云山林寶玉石皆依地而生戒德亦如地眾善之所由無翅欲騰虛度河無良舟人而無戒德濟苦為實難如樹美華果針刺難可攀多聞美色力破戒者亦然達磨多羅禪經云如天德瓶守護不壞常出珍寶隨意無盡修行如是不毀淨戒則常出生聖功德寶輕毀德瓶珍寶即滅若破戒瓶則永失法寶續高僧傳釋道悅云蠶衣損命乖忍辱之名布服儉素表慈悲之相法海觀瀾卷第二三宗要典天台宗大智度論一百卷中論四卷大乘止觀法門四卷法華經安樂行義一卷諸法無諍三昧法門二卷南嶽立誓願文一卷法華玄義二十卷玄義釋籤二十卷法華文句二十卷文句記二十卷摩訶止觀二十卷止觀輔行傳弘決四十卷止觀義例二卷止觀大意十紙餘禪波羅蜜十卷坐禪法要二卷覺意三昧一卷四教義六卷四念處四卷法界次第初門三卷禪門口訣一卷觀經疏一卷妙宗鈔六卷金光明玄義二卷玄義拾遺記六卷金光明文句六卷文句記十二卷觀音玄義二卷玄義記四卷觀音義疏二卷義疏記四卷般若經疏一卷請觀音經疏一卷觀音疏闡義鈔四卷仁王經疏五卷仁王經疏神寶記四卷大涅槃經玄義二卷發源機要四卷大涅槃經疏古十八卷南作二十六卷北作三十三卷觀心論疏三卷北作五卷八教大意一卷智者別傳一卷國清百錄四卷永嘉集一卷永嘉集註二卷金剛錍一卷始終心要一紙十不二門九紙指要鈔二卷指要鈔詳解修懺要旨九紙觀心二百問一卷教行錄七卷傳佛心印記八紙心印記註四教儀一卷四教儀集註十卷三千有門頌略解賢首宗華嚴疏鈔疏四十卷北作六十卷鈔六十卷北作九十卷華嚴懸談會元記四十卷一乘教義分齊章三卷北作四卷華嚴指歸一卷華嚴經明法品內立三寶章二卷圓覺經略疏之鈔三十卷金剛經疏論纂要三卷刊定記七卷心經略疏九紙遺教經論疏節要一卷注華嚴法界觀門一卷華嚴法界玄鏡一卷北作二卷妄盡還源觀十二紙金師子章禪源詮四卷原人論八紙半原人論解四卷慈恩宗楞伽阿跋多羅寶經四卷大乘密嚴經三卷佛地經八紙解深密經五卷瑜伽師地論百卷顯揚聖教論二十卷集論七卷雜集論十六卷辨中邊論三卷攝大乘論二卷成惟識論十卷相宗八要百法明門論解唯識開蒙
